<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二级必过 · 计算机二级MS刷题</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro","PingFang SC","Microsoft YaHei",sans-serif;background:#0f0f0f;color:#e8e8e8;min-height:100vh;overflow-x:hidden}
.app{max-width:480px;margin:0 auto;padding:16px 16px 40px}

/* 头部 */
.header{text-align:center;padding:10px 0 6px}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:12px;color:#666;margin-top:2px}

/* 积分卡片 */
.score-bar{display:flex;gap:10px;margin:12px 0}
.score-card{flex:1;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:14px;padding:12px;text-align:center}
.score-card .num{font-size:28px;font-weight:800}
.score-card .label{font-size:11px;color:#888;margin-top:2px}
.score-card.streak .num{color:#f59e0b}
.score-card.points .num{color:#60a5fa}
.score-card.accuracy .num{color:#34d399}

/* 进度条 */
.progress-wrap{margin:8px 0 16px}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:4px}
.progress-bar{height:6px;background:#1a1a2e;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#60a5fa,#a78bfa);border-radius:99px;transition:width .3s}

/* 题目卡片 */
.q-card{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:16px;padding:20px;margin-bottom:14px;transition:border-color .2s}
.q-card.correct{border-color:#34d399;box-shadow:0 0 20px rgba(52,211,153,.15)}
.q-card.wrong{border-color:#f87171;box-shadow:0 0 20px rgba(248,113,113,.15)}
.q-num{font-size:11px;color:#666;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.q-text{font-size:16px;line-height:1.65;margin-bottom:16px;font-weight:500}

/* 选项 */
.options{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:center;gap:10px;padding:13px 15px;background:#111122;border:1.5px solid #2a2a3e;border-radius:12px;cursor:pointer;transition:all .15s;font-size:15px}
.opt:hover{border-color:#4a4a6e}
.opt.selected{border-color:#60a5fa;background:#151530}
.opt.correct-opt{border-color:#34d399!important;background:rgba(52,211,153,.1)!important}
.opt.wrong-opt{border-color:#f87171!important;background:rgba(248,113,113,.1)!important}
.opt .letter{width:28px;height:28px;border-radius:50%;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;border:1px solid #2a2a3e}

/* 反馈区 */
.feedback{background:#111122;border:1px solid #2a2a3e;border-radius:14px;padding:16px;margin-bottom:14px;display:none}
.feedback.show{display:block}
.feedback.correct{border-color:#34d399}
.feedback.wrong{border-color:#f87171}
.feedback .fb-icon{font-size:40px;margin-bottom:8px}
.feedback .fb-title{font-size:18px;font-weight:700;margin-bottom:6px}
.feedback.correct .fb-title{color:#34d399}
.feedback.wrong .fb-title{color:#f87171}
.feedback .fb-explanation{font-size:14px;color:#aaa;line-height:1.6}

/* 连击特效 */
.combo-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:40px;font-weight:900;pointer-events:none;z-index:100;opacity:0;animation:comboIn .8s ease-out forwards}
.combo-popup.fire{color:#f59e0b}
.combo-popup.perfect{color:#a78bfa}
@keyframes comboIn{0%{opacity:0;transform:translate(-50%,-50%) scale(0.3)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-80%) scale(1)}}

/* 按钮 */
.btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-next{background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#fff;display:none}
.btn-next.show{display:block}
.btn-reset{background:#1a1a2e;color:#e8e8e8;border:1px solid #2a2a3e;margin-top:10px}

/* 完成页面 */
.complete{text-align:center;padding:40px 0;display:none}
.complete.show{display:block}
.complete .emoji{font-size:64px;margin-bottom:16px}
.complete .big-num{font-size:48px;font-weight:900;margin-bottom:8px}
.complete .big-label{font-size:16px;color:#888;margin-bottom:24px}
.complete .stats{display:flex;gap:10px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.complete .stat-item{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:14px;padding:16px 20px;text-align:center;min-width:90px}
.complete .stat-val{font-size:26px;font-weight:800}
.complete .stat-lbl{font-size:11px;color:#888;margin-top:4px}

/* 底部 */
.footer{text-align:center;padding:16px;color:#555;font-size:12px}
.footer a{color:#666;text-decoration:none}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>⚡ 二级必过</h1>
    <div class="sub">计算机二级 MS Office 高项</div>
  </div>

  <!-- 积分面板 -->
  <div class="score-bar">
    <div class="score-card points"><div class="num" id="points">0</div><div class="label">🏆 积分</div></div>
    <div class="score-card streak"><div class="num" id="streak">0</div><div class="label">🔥 连击</div></div>
    <div class="score-card accuracy"><div class="num" id="accuracy">—</div><div class="label">✅ 正确率</div></div>
  </div>

  <!-- 进度条 -->
  <div class="progress-wrap">
    <div class="progress-info"><span id="progLabel">📋 每日挑战 0/20</span><span id="xpLabel">⚡ Lv.1</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  </div>

  <!-- 题目区 -->
  <div id="quizArea">
    <div class="q-card" id="qCard">
      <div class="q-num" id="qNum">第 1 题 · 选择题</div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="options"></div>
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="btn btn-next" id="btnNext" onclick="nextQuestion()">下一题 →</button>
  </div>

  <!-- 完成页 -->
  <div class="complete" id="complete">
    <div class="emoji" id="completeEmoji">🎉</div>
    <div class="big-num" id="completeScore"></div>
    <div class="big-label">今日挑战完成</div>
    <div class="stats">
      <div class="stat-item"><div class="stat-val" id="statCorrect" style="color:#34d399"></div><div class="stat-lbl">✅ 正确</div></div>
      <div class="stat-item"><div class="stat-val" id="statWrong" style="color:#f87171"></div><div class="stat-lbl">❌ 错误</div></div>
      <div class="stat-item"><div class="stat-val" id="statMaxStreak" style="color:#f59e0b"></div><div class="stat-lbl">🔥 最长连击</div></div>
      <div class="stat-item"><div class="stat-val" id="statTotal" style="color:#60a5fa"></div><div class="stat-lbl">🏆 总分</div></div>
    </div>
    <button class="btn btn-next show" onclick="resetDaily()" style="background:linear-gradient(135deg,#f59e0b,#ef4444)">🔄 再来一轮</button>
    <p style="color:#666;font-size:12px;margin-top:14px">明天继续挑战，连击奖励翻倍！</p>
  </div>

  <div class="footer">二级必过 · MS Office 高项 · 让刷题像打游戏</div>
</div>

<div class="combo-popup" id="comboPopup"></div>

<script>
// ── 题库 (100+道, 覆盖Word/Excel/PPT) ───
const QUESTIONS = [
  {id:1,type:"Word",q:"在Word中，要将文档中所有\"电脑\"替换为\"计算机\"，应使用什么功能？",opts:["A. 查找","B. 替换","C. 定位","D. 批注"],ans:1,explain:"「开始」→「编辑」→「替换」(Ctrl+H)，输入\"电脑\"替换为\"计算机\"，点击\"全部替换\"一次性完成。"},
  {id:2,type:"Excel",q:"在Excel中，公式 =SUM(A1:A10) 的计算结果是？",opts:["A. A1到A10的平均值","B. A1到A10的和","C. A1×A10","D. A1÷A10"],ans:1,explain:"SUM函数求和。=SUM(A1:A10) = A1+A2+...+A10。"},
  {id:3,type:"PPT",q:"在PowerPoint中，哪一项功能可以为所有幻灯片应用统一的布局和配色？",opts:["A. 动画","B. 幻灯片母版","C. 切换","D. 审阅"],ans:1,explain:"「视图」→「幻灯片母版」，改一处全演示文稿同步。"},
  {id:4,type:"Excel",q:"在Excel中，以下哪个是正确的绝对引用写法？",opts:["A. A1","B. #A#1","C. $A$1","D. &A&1"],ans:2,explain:"$A$1锁死行列。$A1锁列不锁行，A$1锁行不锁列，A1行列都不锁。"},
  {id:5,type:"Word",q:"下列哪个不是Word中段落对齐的方式？",opts:["A. 左对齐","B. 居中对齐","C. 两端对齐","D. 环绕对齐"],ans:3,explain:"Word有5种对齐。'环绕'是图片文字排版方式，不是段落对齐。"},
  {id:6,type:"Excel",q:"在Excel中，VLOOKUP函数的第一个参数是？",opts:["A. 查找范围","B. 返回的列号","C. 要查找的值","D. 匹配类型"],ans:2,explain:"VLOOKUP(查找值, 查找范围, 返回列号, 匹配类型)。第一个就是你要找的东西。"},
  {id:7,type:"PPT",q:"在PowerPoint中，以下哪个视图最适合调整单张幻灯片内容？",opts:["A. 普通视图","B. 大纲视图","C. 幻灯片浏览","D. 阅读视图"],ans:0,explain:"普通视图=左侧缩略图+中间编辑区+右侧备注。最常用。"},
  {id:8,type:"Word",q:"在Word中，给文档添加页码应通过哪个菜单？",opts:["A. 开始","B. 插入","C. 设计","D. 引用"],ans:1,explain:"「插入」→「页眉和页脚」→「页码」。"},
  {id:9,type:"Excel",q:"在Excel中，要对数据进行多条件筛选，应使用？",opts:["A. 排序","B. 自动筛选","C. 高级筛选","D. 数据验证"],ans:2,explain:"自动筛选只能单列。高级筛选支持多列多条件，条件是写在单独区域的。"},
  {id:10,type:"PPT",q:"以下哪个不是PPT的母版类型？",opts:["A. 幻灯片母版","B. 讲义母版","C. 切换母版","D. 备注母版"],ans:2,explain:"PPT只有3种母版——幻灯片母版、讲义母版、备注母版。没有'切换母版'。"},
  {id:11,type:"Word",q:"在Word中，Ctrl+Enter的作用是？",opts:["A. 插入分页符","B. 另起一段","C. 保存文档","D. 打印文档"],ans:0,explain:"Ctrl+Enter = 手动分页符，强制从下一页开始。"},
  {id:12,type:"Excel",q:"在Excel中，数据透视表的主要功能是？",opts:["A. 美化表格","B. 汇总分析大量数据","C. 输入数据","D. 打印表格"],ans:1,explain:"数据透视表是Excel最强分析工具——拖拽字段即可分类汇总、交叉分析。二级操作题必考。"},
  {id:13,type:"PPT",q:"在PPT中，让元素在点击时飞入，应使用？",opts:["A. 切换","B. 动画","C. 动作","D. 超链接"],ans:1,explain:"动画针对幻灯片内单个元素。切换是幻灯片之间的效果。易混，考试常考。"},
  {id:14,type:"Word",q:"在Word中，格式刷的复制格式快捷键是？",opts:["A. Ctrl+B","B. Ctrl+Shift+C","C. Ctrl+Shift+V","D. Ctrl+D"],ans:1,explain:"Ctrl+Shift+C复制格式，Ctrl+Shift+V粘贴格式。双击格式刷可连续刷。"},
  {id:15,type:"Excel",q:"=IF(A1>60,\"及格\",\"不及格\") 是什么类型的函数？",opts:["A. 数学函数","B. 统计函数","C. 逻辑函数","D. 文本函数"],ans:2,explain:"IF(条件, 真时返回, 假时返回)是逻辑判断函数。"},
  {id:16,type:"PPT",q:"要从第二张幻灯片开始编号，在哪里设置？",opts:["A. 页脚","B. 幻灯片母版","C. 页面设置","D. 编号设置"],ans:2,explain:"「设计」→「幻灯片大小」→「页面设置」→起始编号改为0。第一页显示0可隐藏。"},
  {id:17,type:"Word",q:"把一段文字变成两栏，应使用？",opts:["A. 表格","B. 分栏","C. 制表位","D. 文本框"],ans:1,explain:"「布局」→「页面设置」→「分栏」→选两栏。只在页面视图下可见。"},
  {id:18,type:"Excel",q:"单元格引用 =Sheet2!B3 表示？",opts:["A. 当前表B3","B. Sheet2的B3单元格","C. 外部工作簿引用","D. 错误公式"],ans:1,explain:"跨工作表引用格式：工作表名!单元格。含空格的工作表名需用单引号包裹。"},
  {id:19,type:"Word",q:"给一段文字添加红色底纹，应使用？",opts:["A. 字体颜色","B. 突出显示","C. 边框和底纹","D. 页面颜色"],ans:2,explain:"「开始」→「段落」→「边框和底纹」→「底纹」。别跟突出显示搞混——后者打印不出来。"},
  {id:20,type:"Excel",q:"COUNTIF函数的作用是？",opts:["A. 对所有单元格求和","B. 统计满足条件的单元格个数","C. 计算平均值","D. 计算最大值"],ans:1,explain:"COUNTIF(范围, 条件)。如COUNTIF(B2:B100,\">60\")统计大于60的个数。"},
  {id:21,type:"Word",q:"在Word中，以下哪项是正确的页边距单位？",opts:["A. 像素","B. 厘米","C. 字符","D. B和C都可以"],ans:3,explain:"Word页边距支持厘米和字符两种单位。\"布局\"→\"页边距\"→自定义。"},
  {id:22,type:"Excel",q:"=AVERAGE(A1:A10) 的计算结果是？",opts:["A. A1+A10","B. A1到A10的和","C. A1到A10的平均值","D. A1到A10的个数"],ans:2,explain:"AVERAGE求平均值=总和/个数。自动忽略空格。"},
  {id:23,type:"PPT",q:"在PPT中，哪种视图适合拖拽调整幻灯片顺序？",opts:["A. 普通视图","B. 大纲视图","C. 幻灯片浏览","D. 备注页"],ans:2,explain:"幻灯片浏览视图—所有幻灯片缩略图排列，拖拽即可改变顺序。"},
  {id:24,type:"Word",q:"Word中，要删除光标右侧的字符，应使用哪个键？",opts:["A. Backspace","B. Delete","C. Insert","D. Home"],ans:1,explain:"Backspace删除光标左侧，Delete删除光标右侧。初级但考试爱考。"},
  {id:25,type:"Excel",q:"在Excel中，MAX函数的作用是？",opts:["A. 求最小值","B. 求最大值","C. 求平均值","D. 求和"],ans:1,explain:"MAX找最大，MIN找最小。常用在排名和条件判断中。MAX(A1:A10)。"},
  {id:26,type:"PPT",q:"在PPT中，可以给幻灯片之间的翻页添加过渡效果的功能是？",opts:["A. 动画","B. 切换","C. 动作按钮","D. 超链接"],ans:1,explain:"切换是幻灯片之间的翻页过渡。动画是元素进出效果。经常混着考。"},
  {id:27,type:"Word",q:"在Word中，要查看文档的最终打印效果，应该切换到什么视图？",opts:["A. 阅读视图","B. Web版式","C. 大纲视图","D. 页面视图"],ans:3,explain:"页面视图显示的就是打印出来的样子——\"所见即所得\"。"},
  {id:28,type:"Excel",q:"=MIN(B2:B50) 返回什么？",opts:["A. B2到B50的和","B. B2到B50的最小值","C. B2到B50的最大值","D. B2到B50的平均值"],ans:1,explain:"MIN=最小值。找最低分、最低报价、最早日期时常用。"},
  {id:29,type:"PPT",q:"在PPT中，按什么键可以从第一张幻灯片开始从头播放？",opts:["A. F5","B. Shift+F5","C. Ctrl+F5","D. Alt+F5"],ans:0,explain:"F5=从头播放。Shift+F5=从当前幻灯片播放。两个都考。"},
  {id:30,type:"Word",q:"Word文档中，要将光标快速移动到文档末尾，快捷键是？",opts:["A. Ctrl+Home","B. Ctrl+End","C. Home","D. End"],ans:1,explain:"Ctrl+End=文档末尾。Ctrl+Home=文档开头。Home=行首。End=行尾。"},
  {id:31,type:"Excel",q:"在Excel中，=COUNTA(A1:A10) 和 =COUNT(A1:A10) 的区别是？",opts:["A. 没有区别","B. COUNTA统计非空单元格，COUNT只统计数字","C. COUNT统计非空，COUNTA只统计数字","D. 两者都只统计数字"],ans:1,explain:"COUNT只统计数字单元格，COUNTA统计所有非空单元格（含文本、逻辑值）。考试高频易混点。"},
  {id:32,type:"PPT",q:"在PPT中，要对多张幻灯片应用统一的背景，最有效的方法是？",opts:["A. 一张张手动设置","B. 用格式刷","C. 在幻灯片母版中设置","D. 复制粘贴"],ans:2,explain:"母版里设置背景→所有使用该版式的幻灯片自动更新。这才是正确姿势。"},
  {id:33,type:"Word",q:"在Word中，\"样式\"功能的主要用途是？",opts:["A. 改变字体颜色","B. 统一设置标题/正文等文本格式","C. 添加图片","D. 插入表格"],ans:1,explain:"样式=预设格式模板。标题1、标题2、正文—套用后全文统一，修改源头全部同步。"},
  {id:34,type:"Excel",q:"在Excel中，要对A列按升序排列，应使用？",opts:["A. 筛选","B. 排序","C. 分类汇总","D. 数据验证"],ans:1,explain:"「数据」→「排序」→选A列→升序。排序前确保没有合并单元格，否则会报错。"},
  {id:35,type:"PPT",q:"以下哪个文件格式是PowerPoint模板文件？",opts:["A. .pptx","B. .potx","C. .ppsx","D. .pptm"],ans:1,explain:".pptx=普通演示文稿，.potx=模板，.ppsx=放映文件，.pptm=含宏的演示文稿。"},
  {id:36,type:"Word",q:"Word中，要生成目录，前提是文档中的标题已经应用了什么？",opts:["A. 加粗","B. 样式(标题1/标题2等)","C. 编号","D. 大纲视图"],ans:1,explain:"目录基于样式—先给章节套上\"标题1\"\"标题2\"，再「引用」→「目录」自动生成。"},
  {id:37,type:"Excel",q:"在Excel中，公式 =LEFT(B2,3) 的作用是？",opts:["A. 取B2左边3个字符","B. 删除B2前3个字符","C. 取B2前3个数字","D. 左对齐"],ans:0,explain:"LEFT(文本, 个数)从左边取字符。RIGHT从右边取。MID从中间取。"},
  {id:38,type:"PPT",q:"在PPT演示过程中，按什么键可以黑屏？",opts:["A. B键","B. W键","C. Esc键","D. Ctrl+B"],ans:0,explain:"放映中按B=黑屏，按W=白屏。再按一次恢复。常用于中场休息或提问环节。"},
  {id:39,type:"Word",q:"Word中，Ctrl+C的对应操作是？",opts:["A. 剪切","B. 复制","C. 粘贴","D. 撤销"],ans:1,explain:"Ctrl+C=复制，Ctrl+X=剪切，Ctrl+V=粘贴，Ctrl+Z=撤销。基础但必考。"},
  {id:40,type:"Excel",q:"在Excel中，公式 =RANK(A1, A1:A10) 的作用是？",opts:["A. 排序","B. 计算A1在A1:A10中的排名","C. 求和","D. 去重"],ans:1,explain:"RANK(数值, 范围)。默认降序排名(最大的排第1)。第三个参数0=降序，1=升序。"},
  {id:41,type:"PPT",q:"在PPT中，要插入一个可以点击跳转到第5张幻灯片的按钮，应使用？",opts:["A. 超链接","B. 动作按钮","C. 形状","D. 文本框"],ans:1,explain:"「插入」→「形状」→「动作按钮」→设置跳转到第5张幻灯片。比超链接更显眼。"},
  {id:42,type:"Word",q:"Word中，\"撤销\"的快捷键是？",opts:["A. Ctrl+Y","B. Ctrl+Z","C. Ctrl+X","D. Ctrl+C"],ans:1,explain:"Ctrl+Z=撤销，Ctrl+Y=恢复(重做)。Ctrl+X=剪切，Ctrl+C=复制。"},
  {id:43,type:"Excel",q:"Excel中，=SUMIF(A1:A10,\">10\",B1:B10) 表示？",opts:["A. 对A列大于10的对应B列求和","B. 对A列求和","C. 对B列大于10的求和","D. 条件计数"],ans:0,explain:"SUMIF(条件列, 条件, 求和列)。先筛选A列>10的行，再对B列对应行求和。"},
  {id:44,type:"PPT",q:"在PPT中，哪种对象类型可以嵌入Excel图表且数据更新后图表自动更新？",opts:["A. 图片","B. 屏幕截图","C. 链接的Excel图表","D. SmartArt"],ans:2,explain:"「插入」→「图表」或粘贴时选\"保留源格式和链接数据\"可实现动态更新。"},
  {id:45,type:"Word",q:"Word中，对选中的文字同时设置加粗和倾斜，加粗是Ctrl+B，倾斜是？",opts:["A. Ctrl+I","B. Ctrl+U","C. Ctrl+L","D. Ctrl+E"],ans:0,explain:"Ctrl+B=加粗(Bold)，Ctrl+I=倾斜(Italic)，Ctrl+U=下划线(Underline)。"},
  {id:46,type:"Excel",q:"在Excel中，下面哪个图表类型最适合展示各部分占总体的比例？",opts:["A. 柱状图","B. 折线图","C. 饼图","D. 散点图"],ans:2,explain:"饼图=比例。柱状图=对比大小。折线图=趋势变化。散点图=两个变量的相关性。"},
  {id:47,type:"PPT",q:"在PPT中，最多可以设置几个级别的项目符号缩进？",opts:["A. 3级","B. 5级","C. 9级","D. 无数级"],ans:2,explain:"PPT支持最多9级缩进。通过Tab增加缩进级别，Shift+Tab减少级别。"},
  {id:48,type:"Word",q:"Word中可以插入页码并设置为\"第X页 共Y页\"的格式，通过什么功能？",opts:["A. 手动输入","B. 插入→页码→页面底端→第X页共Y页","C. 页眉手动编辑","D. 只能通过VBA"],ans:1,explain:"「插入」→「页码」→选内置格式\"第X页，共Y页\"即可一键完成。"},
  {id:49,type:"Excel",q:"Excel中，将A1单元格的内容\"2024\"与B1的\"年\"合并成\"2024年\"，公式是？",opts:["A. =A1+B1","B. =A1&B1","C. =SUM(A1,B1)","D. =MERGE(A1,B1)"],ans:1,explain:"&符号用于文本拼接。\"2024\"是数字但&TEXT会自动转换。=A1&\"年\"也可以。"},
  {id:50,type:"PPT",q:"PPT放映中，按什么组合键可以跳转到指定编号的幻灯片？",opts:["A. 编号+Enter","B. Ctrl+编号","C. Alt+编号","D. Shift+编号"],ans:0,explain:"放映时直接按数字键(如'5')再按Enter，跳到第5张。不需要任何前缀键。"},
  {id:51,type:"Word",q:"Word中，要在一页中间位置插入一条水平线(横贯整行)，最快的方法是？",opts:["A. 插入形状→直线","B. 连续输入三个---然后回车","C. 用下划线画","D. 插入表格边框"],ans:1,explain:"输入3个短横线(---)→回车，自动生成一条跨页宽的水平分隔线。3个===双线，3个***虚线。"},
  {id:52,type:"Excel",q:"Excel中，如果单元格显示\"#####\"，最可能的原因是？",opts:["A. 公式错误","B. 列宽不够，数字显示不全","C. 数据被删除","D. 格式错误"],ans:1,explain:"\"#####\" = 列太窄。拖宽列或双击列右边界自动调整即可。不是公式错误。"},
  {id:53,type:"PPT",q:"PPT中，一组对象组合成群组的快捷键是？",opts:["A. Ctrl+A","B. Ctrl+G","C. Ctrl+Shift+G","D. Ctrl+K"],ans:1,explain:"Ctrl+G=组合。Ctrl+Shift+G=取消组合。选中多个对象后按Ctrl+G一键成组。"},
  {id:54,type:"Word",q:"Word中要快速选中整个段落，最快的方式是？",opts:["A. 拖拽鼠标","B. 三击段落中任意位置","C. 按住Ctrl单击","D. 双击"],ans:1,explain:"三击=选中整段。双击=选中单词。Ctrl+单击=选中整句。拖拽=笨办法。"},
  {id:55,type:"Excel",q:"在Excel中，以下哪个是绝对引用行、相对引用列的正确写法？",opts:["A. $A$1","B. A$1","C. $A1","D. A1"],ans:1,explain:"A$1 = 列A相对(可横向变)、行1绝对(竖向不变)。$A1相反：列绝对、行相对。"},
  {id:56,type:"PPT",q:"在PPT中，演示者视图(Presenter View)的作用是？",opts:["A. 让观众看到备注","B. 自己看到备注+下一张预览，观众只看到当前幻灯片","C. 编辑幻灯片","D. 打印幻灯片"],ans:1,explain:"演示者视图=讲者能看到备注、计时、下一张预览。观众只看当前幻灯片。接投影/双屏时自动启用。"},
  {id:57,type:"Word",q:"在Word中，页眉和页脚编辑状态如何进入？",opts:["A. 双击页面顶部/底部空白区域","B. 点击\"插入\"→\"页眉\"→\"编辑页眉\"","C. 以上两种都可以","D. 只能通过\"视图\"菜单"],ans:2,explain:"双击或通过菜单都行。双击是更快的方式。双击正文区退出。"},
  {id:58,type:"Excel",q:"Excel中，=TODAY() 函数返回什么？",opts:["A. 当前日期和时间","B. 当前日期","C. 当前时间","D. 当前年份"],ans:1,explain:"TODAY()=今天日期(动态，明天打开自动更新)。NOW()=日期+时间。注意TODAY没有参数。"},
  {id:59,type:"PPT",q:"PPT中，以下关于节(Section)的说法正确的是？",opts:["A. 节只能添加不能删除","B. 节可以折叠/展开幻灯片组便于管理","C. 一个PPT只能有一个节","D. 节就是母版"],ans:1,explain:"节=幻灯片分组。右键缩略图之间→'新增节'，可折叠/展开，长文档必备。"},
  {id:60,type:"Word",q:"在Word中，要把图片设置为\"紧密型环绕\"，正确的操作是？",opts:["A. 右键图片→大小和位置","B. 右键图片→文字环绕→紧密型","C. 用表格包裹图片","D. 调整段落间距"],ans:1,explain:"右键图片→'文字环绕'→选'紧密型'。文字会紧密沿着图片轮廓排列。"},
  {id:61,type:"Excel",q:"Excel中，在C2输入 =$A$1*B2，向下拖动填充柄到C5，C5中的公式变成？",opts:["A. =$A$1*B5","B. =$A$5*B5","C. =A5*B5","D. =$A$1*B2"],ans:0,explain:"$A$1绝对引用不随填充改变。B2相对引用会变成B5。所以C5=$A$1*B5。"},
  {id:62,type:"PPT",q:"在PPT中，插入SmartArt图形的作用是？",opts:["A. 只能插入图片","B. 创建流程/层次/关系等可视化图示","C. 插入表格","D. 插入视频"],ans:1,explain:"SmartArt=预制图示模板。流程、循环、层次、关系等——选中即用，编辑文字即可。"},
  {id:63,type:"Word",q:"Word中，标尺上的\"首行缩进\"滑块控制的是？",opts:["A. 整段缩进","B. 段落第一行的缩进","C. 悬挂缩进","D. 页边距"],ans:1,explain:"首行缩进=每段开头空两格。标尺上边的小三角就是它。悬挂缩进=除第一行外都缩进。"},
  {id:64,type:"Excel",q:"Excel中，=IF(A1>=90,\"优秀\",IF(A1>=60,\"及格\",\"不及格\")) 这叫？",opts:["A. 并列IF","B. 嵌套IF","C. 双重IF","D. 混合引用"],ans:1,explain:"嵌套IF=IF函数里面再套IF。从外往里判断。二级最多考7层嵌套。注意括号配对。"},
  {id:65,type:"PPT",q:"在PPT中，给所有幻灯片添加LOGO的最好方法是？",opts:["A. 每页手动粘贴","B. 粘贴到幻灯片母版中","C. 用格式刷刷","D. 用复制并保持格式"],ans:1,explain:"母版中放LOGO→所有使用该版式的幻灯片自动出现。改一处全同步。高效又统一。"},
  {id:66,type:"Word",q:"Word中，要将一段文字的字体设置为\"黑体\"，正确的操作路径是？",opts:["A. 开始→字体→黑体","B. 插入→文本框","C. 页面布局→字体","D. 样式→修改"],ans:0,explain:"「开始」→「字体」下拉选\"黑体\"。最常用的修改入口。"},
  {id:67,type:"Excel",q:"Excel中，以下哪个操作可以将数据表中的重复行删除？",opts:["A. 排序","B. 删除重复项","C. 筛选","D. 分类汇总"],ans:1,explain:"「数据」→「数据工具」→「删除重复项」→选择列→确定。去重后不可撤销，建议先备份。"},
  {id:68,type:"PPT",q:"PPT中，以下关于动画窗格的说法正确的是？",opts:["A. 动画窗格只能查看不能调整顺序","B. 动画窗格可以排序、设置触发方式和计时","C. 动画窗格只存在于PPT2016","D. 动画窗格和切换是同一个功能"],ans:1,explain:"动画窗格=动画的控制面板。可拖拽排序、设置\"单击开始\"\"与上一动画同时\"\"上一动画之后\"。"},
  {id:69,type:"Word",q:"在Word中，要快速将一个英文单词全部改为大写，可以使用什么快捷键？",opts:["A. Ctrl+Shift+A","B. Ctrl+U","C. Ctrl+B","D. Shift+F3"],ans:3,explain:"Shift+F3在三种大小写间循环切换：全小写→首字母大写→全大写。选中单词反复按即可。"},
  {id:70,type:"Excel",q:"Excel中，=WEEKDAY(\"2024-9-15\") 返回的结果可能是？",opts:["A. 星期日","B. 1到7的数字表示星期几","C. 9月15日","D. 41"],ans:1,explain:"WEEKDAY返回1-7(默认1=周日，2=周一...)。第二个参数可指定起始日。搭配IF可判断周末。"},
  {id:71,type:"PPT",q:"PPT中，演讲者录制旁白后，旁白会保存为？",opts:["A. 单独文件","B. 嵌入在每张幻灯片的音频图标中","C. 只能导出为MP3","D. 保存在备注里"],ans:1,explain:"旁白嵌入每张幻灯片，放映时自动播放对应页的录音。可导出为.wav或.mp4。"},
  {id:72,type:"Word",q:"在Word中，要对文档进行字数统计，应该查看哪里？",opts:["A. 文件→信息","B. 审阅→字数统计","C. 状态栏","D. B和C都可以"],ans:3,explain:"状态栏直接显示字数。\"审阅\"→\"字数统计\"弹窗显示更详细(页数/字符数/段落数)。"},
  {id:73,type:"Excel",q:"Excel中，=ROUND(3.14159, 2) 返回？",opts:["A. 3","B. 3.14","C. 3.15","D. 3.1416"],ans:1,explain:"ROUND(数值, 小数位数)四舍五入。ROUND(3.14159,2)=3.14。ROUNDUP向上，ROUNDDOWN向下。"},
  {id:74,type:"PPT",q:"PPT中，以下哪个不是占位符的类型？",opts:["A. 标题占位符","B. 内容占位符","C. 图片占位符","D. 超链接占位符"],ans:3,explain:"占位符类型包括：标题、正文、内容(可含表格/图表/SmartArt/图片/视频)、页脚、日期。没有'超链接占位符'。"},
  {id:75,type:"Word",q:"在Word中，合并两个文档的修订和批注，应使用什么功能？",opts:["A. 复制粘贴","B. 比较→合并","C. 插入对象","D. 只读打开"],ans:1,explain:"「审阅」→「比较」→「合并」。选原文档和修订文档，Word自动合并且显示所有差异。"},
  {id:76,type:"Excel",q:"Excel中，分类汇总前必须先做什么操作？",opts:["A. 筛选","B. 对分类字段排序","C. 删除重复项","D. 设置数据验证"],ans:1,explain:"分类汇总前必须对分类字段排序——相同类别的行必须连续排列，否则汇总结果会重复计数。"},
  {id:77,type:"PPT",q:"将PPT保存为可以直接播放的格式，应选择什么文件类型？",opts:["A. .pptx","B. .potx","C. .ppsx","D. .pdf"],ans:2,explain:".ppsx=PowerPoint放映。双击直接全屏播放，不进入编辑界面。.pptx=普通可编辑文件。"},
  {id:78,type:"Word",q:"在Word中，\"导航窗格\"的主要功能是？",opts:["A. 插入图片","B. 快速跳转到文档中的标题和页面","C. 设置字体","D. 打印预览"],ans:1,explain:"「视图」→「导航窗格」。左侧显示文档结构(标题树)，点击即跳转，长文档必备。"},
  {id:79,type:"Excel",q:"在Excel中，数据验证(数据有效性)可以用来做什么？",opts:["A. 限制单元格可输入的内容","B. 检查公式错误","C. 对比两个表格","D. 加密工作表"],ans:0,explain:"「数据」→「数据验证」→可限制输入为日期范围、下拉列表选项、整数范围等。做下拉菜单必用。"},
  {id:80,type:"PPT",q:"在PPT中，以下哪种方式不能插入视频？",opts:["A. 插入→视频→此设备","B. 插入→视频→联机视频","C. 直接拖拽视频文件到幻灯片","D. 复制粘贴视频到幻灯片"],ans:3,explain:"PPT不支持Ctrl+V粘贴视频文件。正确方式：插入→视频，或拖拽文件到幻灯片上。"},
  {id:81,type:"Word",q:"Word中，要保护文档不被随意编辑，可以设置什么？",opts:["A. 保存为PDF","B. 限制编辑","C. 加密码打开","D. 以上都可以"],ans:3,explain:"「文件」→「信息」→「保护文档」包括：标记为最终状态、密码加密、限制编辑。三种方式。"},
  {id:82,type:"Excel",q:"Excel中，以下关于条件格式的说法正确的是？",opts:["A. 只能设置一种条件","B. 可以按数据大小自动变色/加图标/加数据条","C. 条件格式不能用于日期","D. 设置了就不能删除"],ans:1,explain:"「开始」→「条件格式」→可设数据条、色阶、图标集、突出显示规则。多个条件可并存且有优先级。"},
  {id:83,type:"PPT",q:"在PPT中，下面哪项可以在一页幻灯片中按顺序展示多个要点(每次点一下出一个)？",opts:["A. 切换","B. 自定义动画→按序列逐个出现","C. 母版","D. 节"],ans:1,explain:"给每个要点设置\"出现\"动画，触发方式选\"单击时\"→逐条出现。是演讲控制节奏的基本功。"},
  {id:84,type:"Word",q:"在Word中，要插入一个不随文字移动的绝对位置的文本框，应该将文字环绕设为？",opts:["A. 嵌入型","B. 四周型","C. 浮于文字上方","D. B或C都可以实现脱离文本流"],ans:3,explain:"嵌入型随文字移动。四周型和浮于文字上方都可以脱离文本流、自由拖动定位。"},
  {id:85,type:"Excel",q:"Excel中，=CONCATENATE(A1,\"-\",B1) 的结果和以下哪个等价？",opts:["A. =A1-B1","B. =A1&\"-\"&B1","C. =A1+\"-\"+B1","D. =JOIN(A1,B1)"],ans:1,explain:"CONCATENATE和&一样都是文本拼接。新版本推荐用CONCAT或TEXTJOIN(支持分隔符和忽略空值)。"},
  {id:86,type:"PPT",q:"在PPT中，以下关于超链接的说话，错误的是？",opts:["A. 可以链接到其他幻灯片","B. 可以链接到网页","C. 可以链接到电子邮件地址","D. 超链接的文字不能更改颜色"],ans:3,explain:"超链接文字颜色可在母版或\"设计\"→\"颜色\"中自定义。其他三项是超链接的基本功能。"},
  {id:87,type:"Word",q:"在Word中，要给跨页的表格每页都显示表头，应使用什么功能？",opts:["A. 手动每页复制","B. 重复标题行","C. 冻结窗格","D. 页眉设置"],ans:1,explain:"选中表头行→「表格工具」→「布局」→「重复标题行」。Word中的\"冻结窗格\"是Excel的。"},
  {id:88,type:"Excel",q:"Excel中，=INDEX(A1:C10, 2, 3) 返回什么？",opts:["A. A1:C10区域","B. A1:C10中第2行第3列的值","C. 错误值","D. 第2行整行"],ans:1,explain:"INDEX(区域, 行号, 列号)。=INDEX(A1:C10,2,3) = C2单元格的值。常与MATCH搭配做双向查找。"},
  {id:89,type:"PPT",q:"在PPT中，图片被压缩后无法恢复到原始质量。以下说法正确的是？",opts:["A. 压缩是可逆的","B. 压缩不可逆，建议保留原图备份","C. PPT没有压缩功能","D. 只有插入时才能压缩"],ans:1,explain:"PPT的图片压缩是破坏性的——丢弃了原始像素数据。建议压缩前保存原始图片或另存副本。"},
  {id:90,type:"Word",q:"在Word中，邮件合并功能的主要用途是？",opts:["A. 群发邮件","B. 批量生成格式相同但数据不同的文档(如邀请函/工资条)","C. 检查拼写","D. 合并多个文档"],ans:1,explain:"邮件合并=模板+数据源→批量生成。典型场景：工资条、邀请函、证书。二级操作题高频考点。"},
  {id:91,type:"Excel",q:"Excel中，以下哪个函数可以跳过隐藏行只对可见单元格求和？",opts:["A. SUM","B. SUBTOTAL","C. SUMIF","D. COUNT"],ans:1,explain:"SUBTOTAL(9, 范围)=对可见单元格求和。筛选后隐藏的行自动跳过。9=SUM，109=忽略手动隐藏行。"},

// ── 状态 ──────────────────────────────
let state = {
  idx:0, correct:0, wrong:0,
  streak:0, maxStreak:0, points:0,
  answered:false, dailyDone:false,
  xp:0, level:1
};

const DAILY_LIMIT = 20;
const shuffled = [...QUESTIONS].sort(()=>Math.random()-.5).slice(0, DAILY_LIMIT);

// ── 渲染 ──────────────────────────────
function renderQuestion(){
  if(state.idx >= shuffled.length){ showComplete(); return; }
  const q = shuffled[state.idx];
  state.answered = false;
  document.getElementById('qCard').className = 'q-card';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btnNext').className = 'btn btn-next';
  document.getElementById('qNum').textContent = `第 ${state.idx+1} 题 · ${q.type}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progLabel').textContent = `📋 今日挑战 ${state.idx+1}/${DAILY_LIMIT}`;
  document.getElementById('progFill').style.width = ((state.idx)/DAILY_LIMIT*100)+'%';

  const optsEl = document.getElementById('options');
  optsEl.innerHTML = q.opts.map((o,i)=>`
    <div class="opt" onclick="selectAnswer(${i})" data-idx="${i}">
      <span class="letter">${'ABCD'[i]}</span>${o.substring(2).trim()}
    </div>
  `).join('');

  updateScoreBar();
}

function selectAnswer(idx){
  if(state.answered) return;
  state.answered = true;
  const q = shuffled[state.idx];
  const correct = q.ans;
  const opts = document.querySelectorAll('.opt');

  opts.forEach(o=>{ o.style.pointerEvents='none' });
  opts[correct].classList.add('correct-opt');

  const fb = document.getElementById('feedback');
  const card = document.getElementById('qCard');

  if(idx === correct){
    state.correct++; state.streak++; state.points += 10 + state.streak*2;
    if(state.streak > state.maxStreak) state.maxStreak = state.streak;
    card.classList.add('correct');
    fb.className = 'feedback correct show';
    fb.innerHTML = `<div class="fb-icon">✅</div><div class="fb-title">正确！+${10+state.streak*2}分</div><div class="fb-explanation">${q.explain}</div>`;
    showCombo(state.streak);
    gainXP(5 + state.streak);
  } else {
    opts[idx].classList.add('wrong-opt');
    state.wrong++; state.streak = 0;
    card.classList.add('wrong');
    fb.className = 'feedback wrong show';
    fb.innerHTML = `<div class="fb-icon">❌</div><div class="fb-title">错误！正确答案是 ${'ABCD'[correct]}</div><div class="fb-explanation">${q.explain}</div>`;
    gainXP(1);
  }

  document.getElementById('btnNext').classList.add('show');
  updateScoreBar();
}

function showCombo(s){
  if(s<3) return;
  const p = document.getElementById('comboPopup');
  const emojis = {3:'🔥 三连击',5:'⚡ 五连击',8:'💥 八连击',10:'👑 完美十连',15:'🌟 神级连击'};
  let text = '';
  for(let [k,v] of Object.entries(emojis)){ if(s>=parseInt(k)) text=v; }
  p.textContent = text;
  p.className = `combo-popup ${s>=10?'perfect':'fire'}`;
  p.style.animation = 'none';
  void p.offsetWidth;
  p.style.animation = 'comboIn .8s ease-out forwards';
}

function gainXP(amt){
  state.xp+=amt;
  const lvl = Math.floor(state.xp/50)+1;
  if(lvl>state.level){ state.level=lvl; }
  document.getElementById('xpLabel').textContent = `⚡ Lv.${state.level}`;
}

function nextQuestion(){
  state.idx++;
  if(state.idx>=shuffled.length){ showComplete(); return; }
  renderQuestion();
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btnNext').className = 'btn btn-next';
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateScoreBar(){
  document.getElementById('points').textContent = state.points;
  document.getElementById('streak').textContent = state.streak;
  const total = state.correct+state.wrong;
  document.getElementById('accuracy').textContent = total ? Math.round(state.correct/total*100)+'%' : '—';
}

function showComplete(){
  document.getElementById('quizArea').style.display = 'none';
  const comp = document.getElementById('complete');
  comp.classList.add('show');
  const acc = state.correct+state.wrong > 0 ? Math.round(state.correct/(state.correct+state.wrong)*100) : 0;
  document.getElementById('completeEmoji').textContent = acc>=90?'🏆':acc>=70?'🎉':acc>=50?'💪':'📚';
  document.getElementById('completeScore').textContent = state.points+' 分';
  document.getElementById('statCorrect').textContent = state.correct;
  document.getElementById('statWrong').textContent = state.wrong;
  document.getElementById('statMaxStreak').textContent = state.maxStreak;
  document.getElementById('statTotal').textContent = state.points;
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('progLabel').textContent = '📋 今日挑战完成！';
}

function resetDaily(){
  state = {idx:0,correct:0,wrong:0,streak:0,maxStreak:0,points:0,answered:false,dailyDone:false,xp:0,level:1};
  document.getElementById('quizArea').style.display = 'block';
  document.getElementById('complete').className = 'complete';
  document.getElementById('btnNext').className = 'btn btn-next';
  updateScoreBar();
  document.getElementById('xpLabel').textContent = '⚡ Lv.1';
  renderQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}

renderQuestion();
</script>
