<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二级必过 · 计算机二级MS刷题</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro","PingFang SC","Microsoft YaHei",sans-serif;background:#0f0f0f;color:#e8e8e8;min-height:100vh;overflow-x:hidden}
.app{max-width:480px;margin:0 auto;padding:16px 16px 40px}

/* 头部 */
.header{text-align:center;padding:10px 0 6px}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:12px;color:#666;margin-top:2px}

/* 积分卡片 */
.score-bar{display:flex;gap:10px;margin:12px 0}
.score-card{flex:1;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:14px;padding:12px;text-align:center}
.score-card .num{font-size:28px;font-weight:800}
.score-card .label{font-size:11px;color:#888;margin-top:2px}
.score-card.streak .num{color:#f59e0b}
.score-card.points .num{color:#60a5fa}
.score-card.accuracy .num{color:#34d399}

/* 进度条 */
.progress-wrap{margin:8px 0 16px}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:4px}
.progress-bar{height:6px;background:#1a1a2e;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#60a5fa,#a78bfa);border-radius:99px;transition:width .3s}

/* 题目卡片 */
.q-card{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:16px;padding:20px;margin-bottom:14px;transition:border-color .2s}
.q-card.correct{border-color:#34d399;box-shadow:0 0 20px rgba(52,211,153,.15)}
.q-card.wrong{border-color:#f87171;box-shadow:0 0 20px rgba(248,113,113,.15)}
.q-num{font-size:11px;color:#666;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.q-text{font-size:16px;line-height:1.65;margin-bottom:16px;font-weight:500}

/* 选项 */
.options{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:center;gap:10px;padding:13px 15px;background:#111122;border:1.5px solid #2a2a3e;border-radius:12px;cursor:pointer;transition:all .15s;font-size:15px}
.opt:hover{border-color:#4a4a6e}
.opt.selected{border-color:#60a5fa;background:#151530}
.opt.correct-opt{border-color:#34d399!important;background:rgba(52,211,153,.1)!important}
.opt.wrong-opt{border-color:#f87171!important;background:rgba(248,113,113,.1)!important}
.opt .letter{width:28px;height:28px;border-radius:50%;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;border:1px solid #2a2a3e}

/* 反馈区 */
.feedback{background:#111122;border:1px solid #2a2a3e;border-radius:14px;padding:16px;margin-bottom:14px;display:none}
.feedback.show{display:block}
.feedback.correct{border-color:#34d399}
.feedback.wrong{border-color:#f87171}
.feedback .fb-icon{font-size:40px;margin-bottom:8px}
.feedback .fb-title{font-size:18px;font-weight:700;margin-bottom:6px}
.feedback.correct .fb-title{color:#34d399}
.feedback.wrong .fb-title{color:#f87171}
.feedback .fb-explanation{font-size:14px;color:#aaa;line-height:1.8}
.fb-wrong-hint{background:rgba(248,113,113,.1);padding:10px 12px;border-radius:8px;font-size:13px;color:#fc9;margin-top:10px;line-height:1.65}

/* 连击特效 */
.combo-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:40px;font-weight:900;pointer-events:none;z-index:100;opacity:0;animation:comboIn .8s ease-out forwards}
.combo-popup.fire{color:#f59e0b}
.combo-popup.perfect{color:#a78bfa}
@keyframes comboIn{0%{opacity:0;transform:translate(-50%,-50%) scale(0.3)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-80%) scale(1)}}

/* 按钮 */
.btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-next{background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#fff;display:none}
.btn-next.show{display:block}
.btn-reset{background:#1a1a2e;color:#e8e8e8;border:1px solid #2a2a3e;margin-top:10px}

/* 完成页面 */
.complete{text-align:center;padding:40px 0;display:none}
.complete.show{display:block}
.complete .emoji{font-size:64px;margin-bottom:16px}
.complete .big-num{font-size:48px;font-weight:900;margin-bottom:8px}
.complete .big-label{font-size:16px;color:#888;margin-bottom:24px}
.complete .stats{display:flex;gap:10px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.complete .stat-item{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:14px;padding:16px 20px;text-align:center;min-width:90px}
.complete .stat-val{font-size:26px;font-weight:800}
.complete .stat-lbl{font-size:11px;color:#888;margin-top:4px}

/* 底部 */
.footer{text-align:center;padding:16px;color:#555;font-size:12px}
.footer a{color:#666;text-decoration:none}

/* 标签切换 */
.tabs{display:flex;gap:6px;margin-bottom:12px}
.tab-btn{flex:1;padding:10px 0;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;text-align:center}
.tab-btn.active{background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#fff}
.tab-btn.inactive{background:#1a1a2e;color:#666;border:1px solid #2a2a3e}

/* 速查卡 */
.ref-grid{display:flex;flex-direction:column;gap:10px}
.ref-card{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:14px;overflow:hidden}
.ref-card .ref-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.ref-card .ref-header .tag{font-size:10px;padding:3px 8px;border-radius:99px;font-weight:600}
.ref-card .ref-title{font-size:15px;font-weight:600;flex:1;margin:0 10px}
.ref-card .ref-arrow{color:#666;transition:.2s;font-size:12px}
.ref-card.open .ref-arrow{transform:rotate(180deg)}
.ref-card .ref-body{display:none;padding:0 16px 14px;font-size:13px;color:#bbb;line-height:1.8}
.ref-card.open .ref-body{display:block}
.ref-step{display:flex;gap:8px;margin:6px 0;align-items:flex-start}
.ref-step .step-num{width:22px;height:22px;border-radius:50%;background:#60a5fa;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ref-step .step-text{flex:1}
.tag-word{background:rgba(96,165,250,.15);color:#60a5fa}
.tag-excel{background:rgba(52,211,153,.15);color:#34d399}
.tag-ppt{background:rgba(245,158,11,.15);color:#f59e0b}
.ref-shortcut{display:inline-block;background:#111122;padding:1px 8px;border-radius:5px;font-family:monospace;font-size:12px;margin:0 2px}

/* 操作模拟器 */
.sim-wrap{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:16px;overflow:hidden;margin-bottom:14px}
.sim-top{background:#2d2d44;padding:8px 12px;font-size:11px;color:#888;display:flex;align-items:center;gap:8px}
.sim-top .dot{width:10px;height:10px;border-radius:50%}
.sim-win{background:#fff;color:#222;font-size:13px;min-height:360px;position:relative}
.sim-ribbon{background:#f0f0f0;border-bottom:1px solid #ddd;padding:6px 8px 4px}
.sim-tabs{display:flex;gap:2px;margin-bottom:4px;flex-wrap:wrap}
.sim-tab{padding:4px 14px;border-radius:4px 4px 0 0;font-size:11px;cursor:pointer;border:1px solid transparent;border-bottom:none;background:transparent;color:#666;font-family:inherit}
.sim-tab.active{background:#fff;border-color:#ddd;color:#1a73e8;font-weight:600}
.sim-tab.highlight{animation:tabPulse .6s ease 3}
.sim-group{display:inline-flex;flex-direction:column;align-items:center;padding:2px 8px;border-right:1px solid #e0e0e0;min-width:50px}
.sim-group:last-child{border-right:none}
.sim-group .g-label{font-size:9px;color:#999;margin-top:2px}
.sim-btn{display:flex;flex-direction:column;align-items:center;padding:4px 8px;border-radius:4px;cursor:pointer;gap:2px;border:1px solid transparent;transition:.15s;font-family:inherit;font-size:10px;color:#333;background:transparent;min-width:44px}
.sim-btn:hover{background:#e3e3e3}
.sim-btn .b-icon{font-size:16px;line-height:1}
.sim-content{padding:20px;min-height:200px;position:relative}
.sim-content .cursor-line{height:2px;background:#1a73e8;width:60%;margin:40px auto 0;position:relative}
.sim-content .cursor-line::after{content:'';position:absolute;right:-12px;top:-5px;border-left:2px solid #1a73e8;height:14px;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.sim-content .doc-text{color:#999;font-size:14px;text-align:center;margin-top:60px}
.sim-content .doc-text b{color:#555}

/* 热区覆盖 */
.sim-hotzone{position:absolute;border:2px dashed rgba(96,165,250,.6);border-radius:4px;cursor:pointer;transition:.2s;background:rgba(96,165,250,.08)}
.sim-hotzone:hover{background:rgba(96,165,250,.2);border-color:#60a5fa}
.sim-hotzone.correct-click{background:rgba(52,211,153,.2);border-color:#34d399;border-style:solid}
.sim-hotzone.wrong-click{background:rgba(248,113,113,.2);border-color:#f87171;animation:shake .3s}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes tabPulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 3px rgba(96,165,250,.4)}}

.sim-instruction{background:linear-gradient(135deg,rgba(96,165,250,.1),rgba(167,139,250,.1));padding:12px 16px;border-radius:10px;margin-bottom:12px;font-size:14px;color:#e0e0e0;line-height:1.6}
.sim-instruction .step-badge{display:inline-block;background:#60a5fa;color:#fff;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700;margin-right:6px}
.sim-feedback-msg{padding:10px 14px;margin:10px 0;border-radius:8px;font-size:13px;display:none;line-height:1.6}
.sim-feedback-msg.show{display:block}
.sim-feedback-msg.ok{background:rgba(52,211,153,.1);border-left:3px solid #34d399;color:#34d399}
.sim-feedback-msg.err{background:rgba(248,113,113,.1);border-left:3px solid #f87171;color:#f87171}
.sim-progress-steps{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap}
.sim-step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #333;color:#666;transition:.3s}
.sim-step-dot.done{background:#34d399;border-color:#34d399;color:#fff}
.sim-step-dot.current{border-color:#60a5fa;color:#60a5fa;animation:tabPulse 1s infinite}
.sim-step-dot.wrong-step{background:#f87171;border-color:#f87171;color:#fff}
.sim-reset-btn{background:#333;color:#aaa;border:1px solid #444;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:12px;margin-top:10px;font-family:inherit}
.sim-reset-btn:hover{background:#444;color:#fff}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>⚡ 二级必过</h1>
    <div class="sub">计算机二级 MS Office · 选择题20分＋操作考点速查</div>
  </div>

  <!-- 标签切换 -->
  <div class="tabs">
    <button class="tab-btn active" id="btnQuiz" onclick="switchTab('quiz')">📝 刷题</button>
    <button class="tab-btn inactive" id="btnRef" onclick="switchTab('ref')">📋 速查</button>
    <button class="tab-btn inactive" id="btnSim" onclick="switchTab('sim')">🖱 模拟</button>
  </div>

  <!-- 刷题区域 -->
  <div id="quizSection">
    <!-- 积分面板 -->
    <div class="score-bar">
      <div class="score-card points"><div class="num" id="points">0</div><div class="label">🏆 积分</div></div>
      <div class="score-card streak"><div class="num" id="streak">0</div><div class="label">🔥 连击</div></div>
      <div class="score-card accuracy"><div class="num" id="accuracy">—</div><div class="label">✅ 正确率</div></div>
    </div>

    <!-- 进度条 -->
    <div class="progress-wrap">
      <div class="progress-info"><span id="progLabel">📋 每日挑战 0/30</span><span id="xpLabel">⚡ Lv.1</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    </div>

    <!-- 题目区 -->
    <div id="quizArea">
      <div class="q-card" id="qCard">
        <div class="q-num" id="qNum">第 1 题 · 选择题</div>
        <div class="q-text" id="qText"></div>
        <div class="options" id="options"></div>
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="btn btn-next" id="btnNext" onclick="nextQuestion()">下一题 →</button>
    </div>

    <!-- 完成页 -->
    <div class="complete" id="complete">
      <div class="emoji" id="completeEmoji">🎉</div>
      <div class="big-num" id="completeScore"></div>
      <div class="big-label">今日挑战完成</div>
      <div class="stats">
        <div class="stat-item"><div class="stat-val" id="statCorrect" style="color:#34d399"></div><div class="stat-lbl">✅ 正确</div></div>
        <div class="stat-item"><div class="stat-val" id="statWrong" style="color:#f87171"></div><div class="stat-lbl">❌ 错误</div></div>
        <div class="stat-item"><div class="stat-val" id="statMaxStreak" style="color:#f59e0b"></div><div class="stat-lbl">🔥 最长连击</div></div>
        <div class="stat-item"><div class="stat-val" id="statTotal" style="color:#60a5fa"></div><div class="stat-lbl">🏆 总分</div></div>
      </div>
      <button class="btn btn-next show" onclick="resetDaily()" style="background:linear-gradient(135deg,#f59e0b,#ef4444)">🔄 再来一轮</button>
      <p style="color:#666;font-size:12px;margin-top:14px">明天继续挑战，连击奖励翻倍！</p>
    </div>
  </div>

  <!-- 速查卡区域 -->
  <div id="refSection" style="display:none" class="ref-grid"></div>

  <!-- 操作模拟区域 -->
  <div id="simSection" style="display:none">
    <!-- 模拟器选择 -->
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap" id="simSelector"></div>
    <!-- 当前模拟器 -->
    <div id="simContent"></div>
  </div>

  <div class="footer">二级必过 · MS Office 高项 · 让刷题像打游戏</div>
</div>

<div class="combo-popup" id="comboPopup"></div>

<script>
// ── 题库 (145道, 每题含详细解析+错误选项说明) ───
const QUESTIONS = [
  {id:1,type:"Word",q:"在Word中，要将文档中所有\"电脑\"替换为\"计算机\"，应使用什么功能？",opts:["A. 查找", "B. 替换", "C. 定位", "D. 批注"],ans:1,
   wrongs:["查找只能找到\"电脑\"出现的位置，不能批量改成\"计算机\"。", "", "定位(Ctrl+G)只能跳到指定页/行/书签，不能改文字内容。", "批注是给文档添加评论，与替换文字无关。"],
   explain:"「开始」→「编辑」→「替换」或Ctrl+H → 在\"查找内容\"输入\"电脑\"，\"替换为\"输入\"计算机\" → 点\"全部替换\"一次性完成。这是Word最常用的批量修改功能，比逐一手动改快几十倍。注意区分：查找(只定位不改)、替换(查找并替换)、定位(跳到指定位置)。"},
  {id:2,type:"Excel",q:"在Excel中，公式 =SUM(A1:A10) 的计算结果是？",opts:["A. A1到A10的平均值", "B. A1到A10的和", "C. A1×A10", "D. A1÷A10"],ans:1,
   wrongs:["AVERAGE才是求平均值，SUM是求和。", "", "A1×A10用乘法运算符=A1*A10，不是SUM。", "除法用=A1/A10，与SUM无关。"],
   explain:"SUM(范围) = 求和。=SUM(A1:A10)=A1+A2+…+A10。是最基础的Excel函数。与它并列的还有AVERAGE(求平均值)、MAX(求最大值)、MIN(求最小值)、COUNT(计数)。考试经常混着考这四个。"},
  {id:3,type:"PPT",q:"在PowerPoint中，哪一项功能可以为所有幻灯片应用统一的布局和配色？",opts:["A. 动画", "B. 幻灯片母版", "C. 切换", "D. 审阅"],ans:1,
   wrongs:["动画是控制单个元素进出幻灯片的效果，不能统一幻灯片布局。", "", "切换是幻灯片之间的翻页过渡效果，不是统一布局的工具。", "审阅用于检查拼写/添加批注/比较文档，与布局无关。"],
   explain:"「视图」→「幻灯片母版」→在这里改字体、背景、配色、LOGO → 关闭母版视图后，所有使用该母版版式的幻灯片自动同步。改一处、全演示文稿统一更新。这是PPT最高效的设计方式，考试必考。"},
  {id:4,type:"Excel",q:"在Excel中，以下哪个是正确的绝对引用写法？",opts:["A. A1", "B. #A#1", "C. $A$1", "D. &A&1"],ans:2,
   wrongs:["A1是相对引用，复制公式到其他单元格时行列都会变。", "Excel公式中根本没有#这个引用符号，#A#1是无效写法。", "", "&是文本拼接运算符(=A1&B1)，不是引用符号。&A&1也是无效写法。"],
   explain:"$A$1 = 行列都锁死。复制到任何单元格都始终指向A1。$A1 = 锁列不锁行(复制到右边列不变，复制到下面行号变)。A$1 = 锁行不锁列。A1 = 都不锁。考试最常考\"向下填充\"场景——行号想变就用A1，不想变就用A$1。"},
  {id:5,type:"Word",q:"下列哪个不是Word中段落对齐的方式？",opts:["A. 左对齐", "B. 居中对齐", "C. 两端对齐", "D. 环绕对齐"],ans:3,
   wrongs:["左对齐(Ctrl+L)是Word标准段落对齐之一。", "居中对齐(Ctrl+E)也是标准对齐方式。", "两端对齐(Ctrl+J)可使段落左右两端都对齐，是正式文档最常用的对齐。", ""],
   explain:"Word共5种段落对齐：左对齐、居中对齐、右对齐、两端对齐、分散对齐。\"环绕\"是图片与文字之间的排版方式(嵌入型/四周型/紧密型等)，跟段落对齐是两个完全不同的功能。"},
  {id:6,type:"Excel",q:"在Excel中，VLOOKUP函数的第一个参数是？",opts:["A. 查找范围", "B. 返回的列号", "C. 要查找的值", "D. 匹配类型"],ans:2,
   wrongs:["查找范围(table_array)是VLOOKUP的第二个参数，不是第一个。", "返回列号(col_index_num)是第三个参数。", "", "匹配类型(range_lookup)是第四个参数，0精确/1模糊。"],
   explain:"VLOOKUP(查找值, 查找范围, 返回第几列, 匹配方式)。第1参数就是\"你要找什么\"，比如一个学号、一个产品编码。二级考试经常把四个参数顺序打乱考你，记住\"找什么→在哪找→第几列→精确还是模糊\"就不会乱。"},
  {id:7,type:"PPT",q:"在PowerPoint中，以下哪个视图最适合调整单张幻灯片内容？",opts:["A. 普通视图", "B. 大纲视图", "C. 幻灯片浏览", "D. 阅读视图"],ans:0,
   wrongs:["", "大纲视图只显示文字提纲，适合快速编辑标题和正文结构，不适合排版。", "幻灯片浏览适合拖拽调整幻灯片顺序，不适合编辑单张内容。", "阅读视图是播放模式，不能编辑。"],
   explain:"普通视图 = 左侧缩略图 + 中间大编辑区 + 右侧可加备注。是PPT默认也是最常用的编辑视图。考试常考四种视图的用途区分：普通视图(编辑)、幻灯片浏览(排序)、大纲视图(写提纲)、阅读视图(预览播放)。"},
  {id:8,type:"Word",q:"在Word中，给文档添加页码应通过哪个菜单？",opts:["A. 开始", "B. 插入", "C. 设计", "D. 引用"],ans:1,
   wrongs:["开始菜单主要管字体/段落/样式，不包含页码功能。", "", "设计菜单管文档主题/颜色/字体方案，不包含页码。", "引用菜单管目录/脚注/引文，不包含页码。"],
   explain:"「插入」→「页眉和页脚」→「页码」→选择位置(页面底端/顶端/页边距)和样式。如果选了\"页面底端\"→\"第X页 共Y页\"格式，Word会自动显示\"第1页 共10页\"这样的格式。"},
  {id:9,type:"Excel",q:"在Excel中，要对数据进行多条件筛选，应使用？",opts:["A. 排序", "B. 自动筛选", "C. 高级筛选", "D. 数据验证"],ans:2,
   wrongs:["排序只是按某一列的值重新排列行顺序，不筛选数据。", "自动筛选(Ctrl+Shift+L)只能对单列设置筛选条件，不能做多列多条件的复合筛选。", "", "数据验证是限制单元格的输入内容(如下拉菜单)，与筛选无关。"],
   explain:"高级筛选 = 「数据」→「排序和筛选」→「高级」→ 将条件写在工作表的单独空白区域(如A1:F1写列名，A2:F2写条件值)→ 选\"将筛选结果复制到其他位置\"。支持多列多条件，条件之间是\"与\"关系。"},
  {id:10,type:"PPT",q:"以下哪个不是PPT的母版类型？",opts:["A. 幻灯片母版", "B. 讲义母版", "C. 切换母版", "D. 备注母版"],ans:2,
   wrongs:["幻灯片母版是PPT最核心的母版类型，控制所有幻灯片的统一外观。", "讲义母版控制\"打印讲义\"时每页放几张幻灯片的布局。", "", "备注母版控制\"演讲者备注\"的打印格式。"],
   explain:"PPT只有3种母版：幻灯片母版(控制屏幕显示)、讲义母版(控制打印讲义的布局)、备注母版(控制备注页打印格式)。\"切换\"是幻灯片之间的翻页动画(淡入/推入/擦除等)，根本不是母版类型。"},
  {id:11,type:"Word",q:"在Word中，Ctrl+Enter的作用是？",opts:["A. 插入分页符", "B. 另起一段", "C. 保存文档", "D. 打印文档"],ans:0,
   wrongs:["", "另起一段按Enter就行，Ctrl+Enter是多了一个分页符(强制换页)。", "Ctrl+S保存文档。", "Ctrl+P打印文档。"],
   explain:"Ctrl+Enter = 手动分页符。强制从下一页开始，不管当前页写到了哪。与自然换页(文字自动流到下一页)的区别：手动分页符删不掉(是特殊字符)，在\"显示/隐藏编辑标记\"(Ctrl+*)模式下显示为\"——分页符——\"虚线。"},
  {id:12,type:"Excel",q:"在Excel中，数据透视表的主要功能是？",opts:["A. 美化表格", "B. 汇总分析大量数据", "C. 输入数据", "D. 打印表格"],ans:1,
   wrongs:["美化表格可以用\"套用表格格式\"，不是数据透视表的用途。", "", "输入数据是直接在单元格里打字，与数据透视表无关。", "打印表格用文件→打印，与数据透视表无关。"],
   explain:"数据透视表 = Excel最强的数据分析工具。拖拽字段到行/列/值/筛选区域，几秒钟就能对几万行数据做分类汇总、交叉分析、求和/计数/平均值。二级操作题必考——给你一张销售表，让用数据透视表统计每个销售员每月的总销售额。"},
  {id:13,type:"PPT",q:"在PPT中，让元素在点击时飞入，应使用？",opts:["A. 切换", "B. 动画", "C. 动作", "D. 超链接"],ans:1,
   wrongs:["切换是幻灯片之间的翻页效果(如\"淡入\"翻到下一页)，不控制幻灯片内的单个元素。", "", "动作可以设置\"单击时跳转到某页/运行程序\"，但不能让元素飞入。", "超链接是跳转到网页/其他幻灯片/邮箱，不是视觉效果。"],
   explain:"「动画」控制幻灯片内单个元素(文字/图片/形状)的进出/强调/退出效果。\"飞入\"是进入动画之一。而「切换」是幻灯片之间翻页时的过渡效果。这两者考试经常混着考。"},
  {id:14,type:"Word",q:"在Word中，格式刷的复制格式快捷键是？",opts:["A. Ctrl+B", "B. Ctrl+Shift+C", "C. Ctrl+Shift+V", "D. Ctrl+D"],ans:1,
   wrongs:["Ctrl+B=加粗(Bold)。", "", "Ctrl+Shift+V=粘贴格式(配合复制格式使用)。", "Ctrl+D=打开字体对话框，不是格式刷。"],
   explain:"Ctrl+Shift+C = 复制格式(吸管吸一下)。Ctrl+Shift+V = 粘贴格式(刷上去)。双击格式刷图标可以连续刷多个位置，按ESC或再次点击格式刷退出连续模式。注意：格式刷复制的是所有格式(字体+大小+颜色+段落间距等)，不只是字体。"},
  {id:15,type:"Excel",q:"=IF(A1>60,\"及格\",\"不及格\") 是什么类型的函数？",opts:["A. 数学函数", "B. 统计函数", "C. 逻辑函数", "D. 文本函数"],ans:2,
   wrongs:["数学函数如SUM/ROUND/SQRT。IF不属于数学类。", "统计函数如COUNT/AVERAGE/MAX。IF不属于统计类。", "", "文本函数如LEFT/RIGHT/MID/CONCATENATE。IF返回的确实是文本，但它的本质是逻辑判断。"],
   explain:"IF(条件, 条件为真时返回什么, 条件为假时返回什么) = 逻辑判断函数。Excel按函数用途分类：逻辑类(IF/AND/OR/NOT/IFERROR)、数学类(SUM/ROUND/ABS)、统计类(COUNT/AVERAGE/MAX/MIN)、文本类(LEFT/RIGHT/MID)、查找类(VLOOKUP/INDEX/MATCH)。考试常考函数分类。"},
  {id:16,type:"PPT",q:"要从第二张幻灯片开始编号，在哪里设置？",opts:["A. 页脚", "B. 幻灯片母版", "C. 页面设置", "D. 编号设置"],ans:2,
   explain:"「设计」→「幻灯片大小」→「页面设置」→起始编号改为0。第一页显示0可隐藏。"},
  {id:17,type:"Word",q:"把一段文字变成两栏，应使用？",opts:["A. 表格", "B. 分栏", "C. 制表位", "D. 文本框"],ans:1,
   wrongs:["表格可以分成两列，但对文字内容来说分栏更方便。", "", "制表位只是设置制表键的对齐位置，不能把整段文字分成两栏。", "文本框适合局部排版，不能快速把大段文字分栏。"],
   explain:"「布局」→「页面设置」→「分栏」→选两栏或更多栏。还可以加分隔线、调整栏间距。注意：分栏只在\"页面视图\"下可见，其他视图显示为通栏。"},
  {id:18,type:"Excel",q:"单元格引用 =Sheet2!B3 表示？",opts:["A. 当前表B3", "B. Sheet2的B3单元格", "C. 外部工作簿引用", "D. 错误公式"],ans:1,
   explain:"跨工作表引用格式：工作表名!单元格地址。如 =Sheet2!B3。如果工作表名含空格或数字，需用单引号包裹如 ='1月'!B3。跨工作簿引用则加方括号：[销售数据.xlsx]Sheet1!A1。"},
  {id:19,type:"Word",q:"给一段文字添加红色底纹，应使用？",opts:["A. 字体颜色", "B. 突出显示", "C. 边框和底纹", "D. 页面颜色"],ans:2,
   wrongs:["字体颜色只能改文字颜色，不能加背景底纹。", "突出显示(荧光笔)是临时标记，默认打印不出来。", "", "页面颜色只能改整个页面的背景色，不能给选中的段落加底纹。"],
   explain:"「开始」→「段落」→「边框和底纹」→「底纹」→选填充色。跟\"突出显示\"的区别：边框和底纹可以打印出来，突出显示是临时荧光标记默认不打印。"},
  {id:20,type:"Excel",q:"COUNTIF函数的作用是？",opts:["A. 对所有单元格求和", "B. 统计满足条件的单元格个数", "C. 计算平均值", "D. 计算最大值"],ans:1,
   wrongs:["对所有单元格求和用SUM，COUNTIF只是统计个数。", "", "计算平均值用AVERAGE函数。COUNTIF不能算平均值。", "计算最大值用MAX，COUNTIF不能算最大值。"],
   explain:"COUNTIF(范围, 条件) = 统计范围内满足条件的单元格个数。如 =COUNTIF(B2:B100,\">60\") 统计B列中大于60的有几个。类似的还有COUNTIFS(多条件计数)、SUMIF(条件求和)、AVERAGEIF(条件平均)。"},
  {id:21,type:"Word",q:"在Word中，以下哪项是正确的页边距单位？",opts:["A. 像素", "B. 厘米", "C. 字符", "D. B和C都可以"],ans:3,
   explain:"Word页边距支持厘米和字符两种单位。\"布局\"→\"页边距\"→自定义。"},
  {id:22,type:"Excel",q:"=AVERAGE(A1:A10) 的计算结果是？",opts:["A. A1+A10", "B. A1到A10的和", "C. A1到A10的平均值", "D. A1到A10的个数"],ans:2,
   wrongs:["A1+A10只是一个简单的加法，跟AVERAGE算出的平均值完全是两个概念。", "AVERAGE先求和再除个数，跟SUM的结果不同。", "", "COUNT才是计数，AVERAGE求的是平均值。"],
   explain:"AVERAGE(范围) = 求和 / 个数。自动忽略空格和文本单元格，只统计数值单元格。"},
  {id:23,type:"PPT",q:"在PPT中，哪种视图适合拖拽调整幻灯片顺序？",opts:["A. 普通视图", "B. 大纲视图", "C. 幻灯片浏览", "D. 备注页"],ans:2,
   wrongs:["普通视图适合编辑单张幻灯片内容。", "大纲视图只显示文字提纲。", "", "备注页视图是看备注的。"],
   explain:"幻灯片浏览视图 = 所有幻灯片缩略图矩阵排列，拖拽即可改变顺序、增删幻灯片。"},
  {id:24,type:"Word",q:"Word中，要删除光标右侧的字符，应使用哪个键？",opts:["A. Backspace", "B. Delete", "C. Insert", "D. Home"],ans:1,
   wrongs:["Backspace删除光标左侧。", "", "Insert切换插入/改写模式。", "Home跳到行首。"],
   explain:"Delete键删除光标右侧的字符，Backspace删除左侧。这是最基础但考试常考的按键区别。"},
  {id:25,type:"Excel",q:"在Excel中，MAX函数的作用是？",opts:["A. 求最小值", "B. 求最大值", "C. 求平均值", "D. 求和"],ans:1,
   wrongs:["求最小值用MIN。", "", "求平均值用AVERAGE。", "求和用SUM。MAX是找最大值。"],
   explain:"MAX(范围) = 返回范围内的最大值。=MAX(A1:A10)找出最高的分数、最大的金额等。MIN是相反找最小值。"},
  {id:26,type:"PPT",q:"在PPT中，可以给幻灯片之间的翻页添加过渡效果的功能是？",opts:["A. 动画", "B. 切换", "C. 动作按钮", "D. 超链接"],ans:1,
   wrongs:["动画是控制单个元素的进出效果。", "", "动作按钮用于跳转到指定幻灯片/运行程序。", "超链接是跳转到网页/邮箱。"],
   explain:"切换 = 幻灯片之间的翻页过渡动画。如淡入/推入/擦除/分割等。而\"动画\"是控制单张幻灯片内某个元素的进出效果。两者易混，考试常考。"},
  {id:27,type:"Word",q:"在Word中，要查看文档的最终打印效果，应该切换到什么视图？",opts:["A. 阅读视图", "B. Web版式", "C. 大纲视图", "D. 页面视图"],ans:3,
   wrongs:["阅读视图是简化播放模式，不是最真实的打印预览。", "Web版式模拟网页浏览效果，不适合打印预览。", "大纲视图只显示文字提纲，不显示页面布局。", ""],
   explain:"页面视图 = \"所见即所得\"——屏幕上看到的就是打印出来的样子。在页面视图下能看到页边距、页眉页脚、分页位置，是最贴近打印效果的视图。"},
  {id:28,type:"Excel",q:"=MIN(B2:B50) 返回什么？",opts:["A. B2到B50的和", "B. B2到B50的最小值", "C. B2到B50的最大值", "D. B2到B50的平均值"],ans:1,
   wrongs:["求和用SUM，不是MIN。", "", "最大值用MAX，不是MIN。", "平均值用AVERAGE，不是MIN。"],
   explain:"MIN(范围) = 返回最小值。常用场景：找最低价/最低分/最早日期。"},
  {id:29,type:"PPT",q:"在PPT中，按什么键可以从第一张幻灯片开始从头播放？",opts:["A. F5", "B. Shift+F5", "C. Ctrl+F5", "D. Alt+F5"],ans:0,
   wrongs:["", "Shift+F5从当前幻灯片开始播放。", "Ctrl+F5没有特殊功能。", "Alt+F5进入演示者视图(部分版本)。"],
   explain:"F5 = 从头播放(从第一张幻灯片开始)。Shift+F5 = 从当前幻灯片播放。两个都是考试考点。"},
  {id:30,type:"Word",q:"Word文档中，要将光标快速移动到文档末尾，快捷键是？",opts:["A. Ctrl+Home", "B. Ctrl+End", "C. Home", "D. End"],ans:1,
   wrongs:["Ctrl+Home跳到文档开头。", "", "Home跳到当前行首。", "End跳到当前行尾。"],
   explain:"Ctrl+End = 文档末尾。Ctrl+Home = 文档开头。Home = 行首。End = 行尾。这组快捷键Word和Excel通用。"},
  {id:31,type:"Excel",q:"在Excel中，=COUNTA(A1:A10) 和 =COUNT(A1:A10) 的区别是？",opts:["A. 没有区别", "B. COUNTA统计非空单元格，COUNT只统计数字", "C. COUNT统计非空，COUNTA只统计数字", "D. 两者都只统计数字"],ans:1,
   wrongs:["两者有本质区别。", "", "说法反了。", "COUNT不能统计文本，COUNTA可以统计文本。"],
   explain:"COUNT只统计包含数字的单元格。COUNTA统计所有非空单元格(数字+文本+逻辑值+错误值)。如A1:A10中有3个数字+5个文本+2个空：COUNT=3，COUNTA=8。"},
  {id:32,type:"PPT",q:"在PPT中，要对多张幻灯片应用统一的背景，最有效的方法是？",opts:["A. 一张张手动设置", "B. 用格式刷", "C. 在幻灯片母版中设置", "D. 复制粘贴"],ans:2,
   wrongs:["效率太低，不推荐。", "格式刷只能复制格式不能设置背景。", "", "复制粘贴也会复制内容，不是只设置背景。"],
   explain:"母版中设置背景→所有使用该母版版式的幻灯片自动更新。改一处全演示文稿同步。这才是正确规范的做法。"},
  {id:33,type:"Word",q:"在Word中，\"样式\"功能的主要用途是？",opts:["A. 改变字体颜色", "B. 统一设置标题/正文等文本格式", "C. 添加图片", "D. 插入表格"],ans:1,
   wrongs:["改变字体颜色只是样式功能的一小部分，不是主要用途。", "", "添加图片用插入→图片，与样式无关。", "插入表格用插入→表格，与样式无关。"],
   explain:"样式 = 预定义的格式集合。一键套用\"标题1\"\"标题2\"\"正文\"等，修改样式源头→所有套用该样式的文字全部自动更新。写论文/排版必备。"},
  {id:34,type:"Excel",q:"在Excel中，要对A列按升序排列，应使用？",opts:["A. 筛选", "B. 排序", "C. 分类汇总", "D. 数据验证"],ans:1,
   wrongs:["筛选是显示符合条件的行，不改变行顺序。", "", "分类汇总前必须先排序，但它自己不排序。", "数据验证是限制输入内容的。"],
   explain:"「数据」→「排序」→选排序列→升序或降序。注意：排序区域如有合并单元格会导致报错，先取消合并再排序。"},
  {id:35,type:"PPT",q:"以下哪个文件格式是PowerPoint模板文件？",opts:["A. .pptx", "B. .potx", "C. .ppsx", "D. .pptm"],ans:1,
   wrongs:[".pptx是普通可编辑的演示文稿文件。", "", ".ppsx是放映文件，双击直接播放。", ".pptm是含宏的演示文稿。"],
   explain:"PPT文件格式：.pptx(普通演示文稿)、.potx(模板，可重复使用)、.ppsx(放映文件，双击直接全屏)、.pptm(含宏/VBA代码的演示文稿)。"},
  {id:36,type:"Word",q:"Word中，要生成目录，前提是文档中的标题已经应用了什么？",opts:["A. 加粗", "B. 样式(标题1/标题2等)", "C. 编号", "D. 大纲视图"],ans:1,
   wrongs:["加粗是格式特征但不是生成目录的前提。", "", "编号虽然常和样式配合使用，但单独编号不能自动生成目录。", "大纲视图只是查看方式，不能\"套用\"。"],
   explain:"目录基于样式自动生成。步骤：①将章节标题分别套\"标题1\"\"标题2\"\"标题3\" → ②「引用」→「目录」→选自动目录 → ③更新目录：右键→更新域。"},
  {id:37,type:"Excel",q:"在Excel中，公式 =LEFT(B2,3) 的作用是？",opts:["A. 取B2左边3个字符", "B. 删除B2前3个字符", "C. 取B2前3个数字", "D. 左对齐"],ans:0,
   wrongs:["", "删除前3个字符没有对应的函数。RIGHT是从右边取字符。", "LEFT可以取文本中的字符\"2024\"，但LEFT取的是字符不是数字。", "左对齐是格式设置，不是函数。"],
   explain:"LEFT(文本, 字符数) = 从左边取N个字符。如 =LEFT(\"计算机二级\",3) = \"计算机\"。对应的：RIGHT(右边取)、MID(中间取)。"},
  {id:38,type:"PPT",q:"在PPT演示过程中，按什么键可以黑屏？",opts:["A. B键", "B. W键", "C. Esc键", "D. Ctrl+B"],ans:0,
   wrongs:["", "W=白屏。Esc=结束放映。Ctrl+B=加粗文字。", "", ""],
   explain:"放映中：B键=黑屏，W键=白屏。再按一次恢复。常用于中场休息、提问互动环节。Esc=结束放映。"},
  {id:39,type:"Word",q:"Word中，Ctrl+C的对应操作是？",opts:["A. 剪切", "B. 复制", "C. 粘贴", "D. 撤销"],ans:1,
   wrongs:["剪切是Ctrl+X。", "", "粘贴是Ctrl+V。", "撤销是Ctrl+Z。"],
   explain:"Ctrl+C=复制，Ctrl+X=剪切，Ctrl+V=粘贴，Ctrl+Z=撤销。这四个是Windows/Office通用快捷键，整场考试都会用到。"},
  {id:40,type:"Excel",q:"在Excel中，公式 =RANK(A1, A1:A10) 的作用是？",opts:["A. 排序", "B. 计算A1在A1:A10中的排名", "C. 求和", "D. 去重"],ans:1,
   wrongs:["RANK不改变数据顺序，只返回排名值。", "", "RANK返回的是排名不是和。", "RANK跟去重无关。"],
   explain:"RANK(数值, 范围, 排序方式)。默认0=降序(最大排第1)。1=升序(最小排第1)。注意：相同值的排名相同，但会占用位次(如两个第2，下一个是第4不是第3)。"},
  {id:41,type:"PPT",q:"在PPT中，要插入一个可以点击跳转到第5张幻灯片的按钮，应使用？",opts:["A. 超链接", "B. 动作按钮", "C. 形状", "D. 文本框"],ans:1,
   wrongs:["超链接也能跳转但需要点击文字，动作按钮更显眼。", "", "形状只是一个图形，没有跳转功能。", "文本框只是文字容器，不能跳转。"],
   explain:"「插入」→「形状」→最底部有\"动作按钮\"→画在幻灯片上→在弹出的对话框中设置跳转目标。"},
  {id:42,type:"Word",q:"Word中，\"撤销\"的快捷键是？",opts:["A. Ctrl+Y", "B. Ctrl+Z", "C. Ctrl+X", "D. Ctrl+C"],ans:1,
   wrongs:["Ctrl+Y=恢复(重做)，是撤销的反操作。", "", "Ctrl+X=剪切。", "Ctrl+C=复制。"],
   explain:"Ctrl+Z = 撤销上一步操作。Ctrl+Y = 恢复被撤销的操作。两个是\"后悔药\"组合，记牢。"},
  {id:43,type:"Excel",q:"Excel中，=SUMIF(A1:A10,\">10\",B1:B10) 表示？",opts:["A. 对A列大于10的对应B列求和", "B. 对A列求和", "C. 对B列大于10的求和", "D. 条件计数"],ans:0,
   wrongs:["", "对A列求和使用SUM(A1:A10)。", "对B列大于10的求和使用SUMIF(B1:B10,\">10\")。", "条件计数用COUNTIF，SUMIF是条件求和。"],
   explain:"SUMIF(条件列, 条件, 求和列)。先筛选条件列中满足条件的行，再对求和列中对应行求和。考试经常把条件列和求和列设为同一列来迷惑你。"},
  {id:44,type:"PPT",q:"在PPT中，哪种对象类型可以嵌入Excel图表且数据更新后图表自动更新？",opts:["A. 图片", "B. 屏幕截图", "C. 链接的Excel图表", "D. SmartArt"],ans:2,
   wrongs:["图片是静态的，数据变了图片不会更新。", "截图也是静态图片。", "", "SmartArt是预制图示(流程图/层次图)，不能动态链接Excel数据。"],
   explain:"粘贴Excel图表时选\"保留源格式和链接数据\"，或「插入」→「图表」→选类型后在弹出的Excel窗口中编辑数据。源数据改变后图表自动刷新。"},
  {id:45,type:"Word",q:"Word中，对选中的文字同时设置加粗和倾斜，加粗是Ctrl+B，倾斜是？",opts:["A. Ctrl+I", "B. Ctrl+U", "C. Ctrl+L", "D. Ctrl+E"],ans:0,
   wrongs:["", "Ctrl+U=下划线。Ctrl+L没有默认功能。Ctrl+E=居中对齐。", "", ""],
   explain:"Ctrl+B=加粗(Bold)，Ctrl+I=倾斜(Italic)，Ctrl+U=下划线(Underline)。Ctrl+B和Ctrl+I是最常用的文字格式快捷键。"},
  {id:46,type:"Excel",q:"在Excel中，下面哪个图表类型最适合展示各部分占总体的比例？",opts:["A. 柱状图", "B. 折线图", "C. 饼图", "D. 散点图"],ans:2,
   wrongs:["柱状图更适合对比不同类别的数值大小。", "折线图更适合展示数据随时间的变化趋势。", "", "散点图更适合展示两个变量之间的相关性。"],
   explain:"饼图 = 展示各部分占整体的比例。所有扇区加起来 = 100%。扇区大小 = 该部分占总体的百分比。适合展示市场份额、费用构成等。"},
  {id:47,type:"PPT",q:"在PPT中，最多可以设置几个级别的项目符号缩进？",opts:["A. 3级", "B. 5级", "C. 9级", "D. 无数级"],ans:2,
   wrongs:["PPT支持更多级别。", "PPT支持更多级别。", "", "PPT不是无限级，最多9级。"],
   explain:"PPT最多支持9级缩进。Tab=增加缩进级别，Shift+Tab=减少级别。在大纲视图中可以快速看到所有级别的结构。"},
  {id:48,type:"Word",q:"Word中可以插入页码并设置为\"第X页 共Y页\"的格式，通过什么功能？",opts:["A. 手动输入", "B. 插入→页码→页面底端→第X页共Y页", "C. 页眉手动编辑", "D. 只能通过VBA"],ans:1,
   wrongs:["手动输入无法自动更新页码。", "", "在页眉中手动编辑也可以但更麻烦，不如用内置格式。", "VBA可以做到，但不是常规做法。"],
   explain:"「插入」→「页码」→「页面底端」→选择内置格式\"第X页，共Y页\"或\"X/Y\"。一步完成，页码自动更新。"},
  {id:49,type:"Excel",q:"Excel中，将A1单元格的内容\"2024\"与B1的\"年\"合并成\"2024年\"，公式是？",opts:["A. =A1+B1", "B. =A1&B1", "C. =SUM(A1,B1)", "D. =MERGE(A1,B1)"],ans:1,
   wrongs:["+是加法运算符，不能拼接文本", "", "SUM求的是数值和，不能拼接文本。", "Excel没有MERGE函数。"],
   explain:"& = 文本拼接运算符。\"2024\"&\"年\" = \"2024年\"。还可以用CONCATENATE函数或新版本CONCAT/TEXTJOIN函数。"},
  {id:50,type:"PPT",q:"PPT放映中，按什么组合键可以跳转到指定编号的幻灯片？",opts:["A. 编号+Enter", "B. Ctrl+编号", "C. Alt+编号", "D. Shift+编号"],ans:0,
   wrongs:["", "Ctrl+编号没有跳转功能。Alt+编号也没有。Shift+编号也没有。", "", ""],
   explain:"放映时直接按键盘上的数字(如5)再按Enter，跳到第5张幻灯片。这是最快的方式。也可以用右键→\"查看所有幻灯片\"→点击目标页。"},
  {id:51,type:"Word",q:"Word中，要在一页中间位置插入一条水平线(横贯整行)，最快的方法是？",opts:["A. 插入形状→直线", "B. 连续输入三个---然后回车", "C. 用下划线画", "D. 插入表格边框"],ans:1,
   wrongs:["插入直线也可以画横线，但3个短横线回车是最快的方式。", "", "用下划线画费时且不均匀。", "插入表格边框画出来的不是贯穿整行的装饰线。"],
   explain:"Word自动更正：连续3个---回车=细水平线；3个===回车=双线；3个***回车=点线；3个###回车=三条线(中间粗)。想删除：把光标放在线上方→边框→无框线。"},
  {id:52,type:"Excel",q:"Excel中，如果单元格显示\"#####\"，最可能的原因是？",opts:["A. 公式错误", "B. 列宽不够，数字显示不全", "C. 数据被删除", "D. 格式错误"],ans:1,
   wrongs:["公式错误通常显示#VALUE!或#REF!或#NAME?等。", "", "\"#####\"不是数据被删的信号。", "格式错误不会显示#####。"],
   explain:"单元格显示\"#####\" = 列太窄，数字显示不全。拖宽列或双击列标右边界自动调整。如果是日期/时间值显示#####，通常是列宽问题；如果是负数显示####，可能是格式设置为日期。"},
  {id:53,type:"PPT",q:"PPT中，一组对象组合成群组的快捷键是？",opts:["A. Ctrl+A", "B. Ctrl+G", "C. Ctrl+Shift+G", "D. Ctrl+K"],ans:1,
   wrongs:["Ctrl+A=全选。", "", "Ctrl+Shift+G=取消组合。", "Ctrl+K=插入超链接。"],
   explain:"Ctrl+G = 组合选中对象为一个群组(方便整体移动/调整大小)。Ctrl+Shift+G = 取消组合。选中多个对象后按Ctrl+G一键成组。"},
  {id:54,type:"Word",q:"Word中要快速选中整个段落，最快的方式是？",opts:["A. 拖拽鼠标", "B. 三击段落中任意位置", "C. 按住Ctrl单击", "D. 双击"],ans:1,
   wrongs:["拖拽是最笨的办法，效率低且容易选错。", "", "Ctrl+单击=选中的是一整句话。", "双击=选中的是鼠标所在的那个词。"],
   explain:"三击鼠标=选中整段。单击=定位光标。双击=选中单词。Ctrl+单击=选中整句。不同点击次数选中不同范围，学会后效率翻倍。"},
  {id:55,type:"Excel",q:"在Excel中，以下哪个是绝对引用行、相对引用列的正确写法？",opts:["A. $A$1", "B. A$1", "C. $A1", "D. A1"],ans:1,
   wrongs:["$A$1是行列都绝对。", "", "$A1是列绝对行相对(B是错的)。", "A1是相对引用行列都不锁。"],
   explain:"A$1 = 列A相对(横向复制时会变B$1/C$1...)，行1绝对(竖向复制时永远第1行)。向下填充时，A$1保持第1行不变。向右填充时，A$1变成B$1/C$1...列号跟着变。"},
  {id:56,type:"PPT",q:"在PPT中，演示者视图(Presenter View)的作用是？",opts:["A. 让观众看到备注", "B. 自己看到备注+下一张预览，观众只看到当前幻灯片", "C. 编辑幻灯片", "D. 打印幻灯片"],ans:1,
   wrongs:["备注不会投影给观众看。", "", "编辑幻灯片用普通视图，不是演示者视图。", "打印用文件→打印，与演示者视图无关。"],
   explain:"演示者视图：接投影或双屏时自动启用。自己屏幕显示当前页+下一页预览+备注+计时器。观众屏幕只看到当前幻灯片。演讲者的\"提词器\"。"},
  {id:57,type:"Word",q:"在Word中，页眉和页脚编辑状态如何进入？",opts:["A. 双击页面顶部/底部空白区域", "B. 点击\"插入\"→\"页眉\"→\"编辑页眉\"", "C. 以上两种都可以", "D. 只能通过\"视图\"菜单"],ans:2,
   wrongs:["双击顶部/底部是一种方式，但不全。", "菜单方式也是一种，但不全。", "", "也可以通过\"视图\"菜单进入，但前两种更快。"],
   explain:"两种方式进入页眉页脚编辑：①双击页面顶部/底部空白区(最快)；②「插入」→「页眉」→「编辑页眉」。退出：双击正文区或按Esc。"},
  {id:58,type:"Excel",q:"Excel中，=TODAY() 函数返回什么？",opts:["A. 当前日期和时间", "B. 当前日期", "C. 当前时间", "D. 当前年份"],ans:1,
   wrongs:["日期和时间是NOW()，不是TODAY()。", "", "当前时间是NOW()-TODAY()的差值部分吗？不，NOW()返回日期+时间。", "当前年份用YEAR(TODAY())。"],
   explain:"TODAY()返回当前日期(年月日)，不带时间。NOW()返回当前日期+时间。两个都是动态函数——明天打开文件自动变成明天的日期。注意：TODAY()没有参数(括号内什么都不写)。"},
  {id:59,type:"PPT",q:"PPT中，以下关于节(Section)的说法正确的是？",opts:["A. 节只能添加不能删除", "B. 节可以折叠/展开幻灯片组便于管理", "C. 一个PPT只能有一个节", "D. 节就是母版"],ans:1,
   wrongs:["节可以删除。", "", "一个PPT可以有多个节(不同章节用不同的节)。", "节是幻灯片分组，母版是设计模板，两者完全不同。"],
   explain:"节 = 幻灯片分组。右键缩略图之间→\"新增节\"→给节命名(如\"第一章\")→节内的幻灯片可以折叠/展开，方便管理长文档。"},
  {id:60,type:"Word",q:"在Word中，要把图片设置为\"紧密型环绕\"，正确的操作是？",opts:["A. 右键图片→大小和位置", "B. 右键图片→文字环绕→紧密型", "C. 用表格包裹图片", "D. 调整段落间距"],ans:1,
   wrongs:["大小和位置是调整图片尺寸的，不改变环绕方式。", "", "表格包裹图片可以实现环绕效果但更复杂，不如直接改环绕方式。", "调整段落间距与图片环绕无关。"],
   explain:"右键图片→「文字环绕」→选\"紧密型\"。文字会沿着图片的实际轮廓排列(而不是矩形框)。\"四周型\"是沿矩形框排列。\"嵌入型\"是把图片当文字。"},
  {id:61,type:"Excel",q:"Excel中，在C2输入 =$A$1*B2，向下拖动填充柄到C5，C5中的公式变成？",opts:["A. =$A$1*B5", "B. =$A$5*B5", "C. =A5*B5", "D. =$A$1*B2"],ans:0,
   wrongs:["", "$A$5*B5是错的——因为$A$1是绝对，向下拖动时1变成5是错误的。", "A5*B5是错的——$A$1中的A和1都锁定了，不会变成A5。", "$A$1*B2是错的——B2是相对引用向下拖动会变。"],
   explain:"拖动填充柄时：$A$1(绝对引用)不变。B2(相对引用)→B3→B4→B5依次变。所以C5 = $A$1*B5。如果写成$A1，向下时1会变；写成A$1，向右时A会变。"},
  {id:62,type:"PPT",q:"在PPT中，插入SmartArt图形的作用是？",opts:["A. 只能插入图片", "B. 创建流程/层次/关系等可视化图示", "C. 插入表格", "D. 插入视频"],ans:1,
   wrongs:["SmartArt可以插入图片(图片型SmartArt)，但不是主要用途。", "", "SmartArt不能插入表格。", "SmartArt不能插入视频。"],
   explain:"SmartArt = Office内置的可视化图示。类型包括：流程、循环、层次结构、关系、矩阵、棱锥图、图片等。选中即用，修改文字即可，比手动画图快得多。"},
  {id:63,type:"Word",q:"Word中，标尺上的\"首行缩进\"滑块控制的是？",opts:["A. 整段缩进", "B. 段落第一行的缩进", "C. 悬挂缩进", "D. 页边距"],ans:1,
   wrongs:["整段缩进由\"左缩进\"滑块控制。", "", "悬挂缩进是除第一行外其他行都缩进，由标尺下方的三角滑块控制。", "页边距不由标尺滑块控制，而是在页面布局中设置。"],
   explain:"首行缩进=每段开头空两格。标尺上方的小三角滑块就是它。直接拖动可改变缩进量。或者「开始」→「段落」→「特殊格式」→首行缩进。"},
  {id:64,type:"Excel",q:"Excel中，=IF(A1>=90,\"优秀\",IF(A1>=60,\"及格\",\"不及格\")) 这叫？",opts:["A. 并列IF", "B. 嵌套IF", "C. 双重IF", "D. 混合引用"],ans:1,
   wrongs:["并列IF是把多个IF并排写而非嵌套。", "", "双重IF是嵌套了两层，但正式术语就叫\"嵌套IF\"。", "混合引用是单元格引用方式，不是函数类型。"],
   explain:"嵌套IF = IF函数里面再套IF函数。=IF(A1>=90,\"A\",IF(A1>=60,\"B\",IF(A1>=0,\"C\",\"无效\")))。Excel 2016最多嵌套64层。多条IF嵌套时注意每层括号要成对——少一个括号整条公式报错。"},
  {id:65,type:"PPT",q:"在PPT中，给所有幻灯片添加LOGO的最好方法是？",opts:["A. 每页手动粘贴", "B. 粘贴到幻灯片母版中", "C. 用格式刷刷", "D. 用复制并保持格式"],ans:1,
   wrongs:["手动粘贴太麻烦且容易漏页。", "", "格式刷刷的是格式不是内容。LOGO是图片内容，格式刷刷不了。", "复制粘贴效率低且可能位置不一致。"],
   explain:"LOGO放母版里 = 所有使用该版式的幻灯片自动显示LOGO，位置完全一致。改母版一次全同步。两种母版：幻灯片母版(单张版式)和总母版(影响所有版式)。"},
  {id:66,type:"Word",q:"Word中，要将一段文字的字体设置为\"黑体\"，正确的操作路径是？",opts:["A. 开始→字体→黑体", "B. 插入→文本框", "C. 页面布局→字体", "D. 样式→修改"],ans:0,
   wrongs:["", "插入→文本框是添加文字框的。", "页面布局管页边距和纸张方向，不管字体。", "修改样式可以改字体但更绕路。"],
   explain:"「开始」→「字体」→下拉选字体名(如\"黑体\")。也可以直接在字体框里打字搜。改变字体后，所有选中文字同步更新。"},
  {id:67,type:"Excel",q:"Excel中，以下哪个操作可以将数据表中的重复行删除？",opts:["A. 排序", "B. 删除重复项", "C. 筛选", "D. 分类汇总"],ans:1,
   wrongs:["排序只是重新排列数据，不删除重复行。", "", "筛选只是暂时隐藏不符合条件的行，不删除。", "分类汇总是汇总计算，不删除数据。"],
   explain:"「数据」→「数据工具」→「删除重复项」→选择要检查重复的列→确定。注意：删除重复项不可撤销！建议先复制一份数据再操作。"},
  {id:68,type:"PPT",q:"PPT中，以下关于动画窗格的说法正确的是？",opts:["A. 动画窗格只能查看不能调整顺序", "B. 动画窗格可以排序、设置触发方式和计时", "C. 动画窗格只存在于PPT2016", "D. 动画窗格和切换是同一个功能"],ans:1,
   wrongs:["动画窗格可以拖拽排序，调整动画先后顺序。", "", "动画窗格是PPT各版本都有的功能(2007以上)。", "动画窗格管元素动画，切换是幻灯片之间的翻页效果。"],
   explain:"动画窗格 = 所有动画的控制中心。可以：①拖拽排序 → ②右键设置\"开始\"方式(单击时/同时/之后) → ③设置延迟和时间。学会动画窗格=掌控PPT动画节奏。"},
  {id:69,type:"Word",q:"在Word中，要快速将一个英文单词全部改为大写，可以使用什么快捷键？",opts:["A. Ctrl+Shift+A", "B. Ctrl+U", "C. Ctrl+B", "D. Shift+F3"],ans:3,
   wrongs:["Ctrl+Shift+A没有默认功能。", "Ctrl+U是下划线。", "Ctrl+B是加粗。", ""],
   explain:"Shift+F3 = 在三种大小写之间循环切换：全部小写→每个单词首字母大写→全部大写。选中单词反复按即可。是快速调整英文大小写最方便的快捷键。"},
  {id:70,type:"Excel",q:"Excel中，=WEEKDAY(\"2024-9-15\") 返回的结果可能是？",opts:["A. 星期日", "B. 1到7的数字表示星期几", "C. 9月15日", "D. 41"],ans:1,
   wrongs:["WEEKDAY返回数字不是星期几的名称。", "", "WEEKDAY返回的是星期对应的数字，不是日期本身。", "WEEKDAY返回的是数字1-7，不是天数。"],
   explain:"WEEKDAY(日期)返回数字1-7。默认：1=星期日，2=星期一...7=星期六。常配合IF判断是否为工作日：=IF(WEEKDAY(A1,2)<=5,\"工作日\",\"周末\")。第二个参数2表示周一=1。"},
  {id:71,type:"PPT",q:"PPT中，演讲者录制旁白后，旁白会保存为？",opts:["A. 单独文件", "B. 嵌入在每张幻灯片的音频图标中", "C. 只能导出为MP3", "D. 保存在备注里"],ans:1,
   wrongs:["旁白不是单独文件——它与PPT绑定。", "", "虽然可以导出为MP4(含旁白)，但旁白本身是嵌入在PPT内的。", "旁白是录制的语音，不是文字备注。"],
   explain:"「幻灯片放映」→「录制幻灯片演示」→\"从头开始录制\"→勾选\"旁白和激光笔\"+\"幻灯片和动画计时\"。录制完成后每张幻灯片右下角出现小喇叭图标。可以导出为MP4视频。"},
  {id:72,type:"Word",q:"在Word中，要对文档进行字数统计，应该查看哪里？",opts:["A. 文件→信息", "B. 审阅→字数统计", "C. 状态栏", "D. B和C都可以"],ans:3,
   wrongs:["文件→信息可以看字数但不方便。", "审阅菜单中也有字数统计。", "", ""],
   explain:"状态栏左下角直接显示字数。点击状态栏上的字数可以弹出详细统计窗口(页数/字数/字符数/段落数/行数)。更快的方法：Ctrl+Shift+G弹出字数统计。"},
  {id:73,type:"Excel",q:"Excel中，=ROUND(3.14159, 2) 返回？",opts:["A. 3", "B. 3.14", "C. 3.15", "D. 3.1416"],ans:1,
   wrongs:["四舍五入到整数用ROUND(3.14159,0)=3。", "", "3.15是向上取整ROUNDUP的结果。", "3.1416是其他精度。"],
   explain:"ROUND(数值, 小数位数) = 四舍五入。ROUND(3.14159,2)=3.14。ROUNDUP = 向上进位(3.141→3.15)。ROUNDDOWN = 向下舍去(3.149→3.14)。"},
  {id:74,type:"PPT",q:"PPT中，以下哪个不是占位符的类型？",opts:["A. 标题占位符", "B. 内容占位符", "C. 图片占位符", "D. 超链接占位符"],ans:3,
   wrongs:["标题占位符是母版中写好\"单击此处添加标题\"的那个框。", "内容占位符是母版中那个可插入表格/图表/SmartArt/图片/视频的多功能框。", "图片占位符是一种特殊的内容占位符类型。", ""],
   explain:"PPT占位符类型包括：标题、正文、内容(多功能：可插入表格/图表/SmartArt/图片/视频)、图片、图表、表格、SmartArt、媒体、剪贴画、页脚、日期、幻灯片编号。没有\"超链接占位符\"。"},
  {id:75,type:"Word",q:"在Word中，合并两个文档的修订和批注，应使用什么功能？",opts:["A. 复制粘贴", "B. 比较→合并", "C. 插入对象", "D. 只读打开"],ans:1,
   wrongs:["复制粘贴会丢失修订痕迹。", "", "插入对象会嵌入另一个文档但不是合并修订。", "只读打开不能比较修订内容。"],
   explain:"「审阅」→「比较」→「合并」→选择原文档和修订文档→Word自动合并两篇文档的所有修订/批注/格式变更。合并后可逐条\"接受\"或\"拒绝\"。"},
  {id:76,type:"Excel",q:"Excel中，分类汇总前必须先做什么操作？",opts:["A. 筛选", "B. 对分类字段排序", "C. 删除重复项", "D. 设置数据验证"],ans:1,
   wrongs:["筛选不改变行的物理顺序。", "", "删除重复项是去重的，不是为了分类汇总做准备。", "数据验证限制输入内容，跟汇总无关。"],
   explain:"分类汇总前必须排序！原因是：分类汇总按\"分类字段\"分组 → 分组要求同类项相邻 → 不排序会导致同一类别被分成多组，汇总结果重复计数。步骤：先排序→再数据→分类汇总→选分类字段+汇总方式+汇总项。"},
  {id:77,type:"PPT",q:"将PPT保存为可以直接播放的格式，应选择什么文件类型？",opts:["A. .pptx", "B. .potx", "C. .ppsx", "D. .pdf"],ans:2,
   wrongs:[".pptx是普通可编辑文件。", ".potx是模板文件。", "", ".pdf是只读文档格式。"],
   explain:".ppsx = PowerPoint Show(放映文件)。双击直接全屏播放，不进入编辑界面。演讲/展示/发送给客户时用这个格式。按Esc退出放映后可编辑。"},
  {id:78,type:"Word",q:"在Word中，\"导航窗格\"的主要功能是？",opts:["A. 插入图片", "B. 快速跳转到文档中的标题和页面", "C. 设置字体", "D. 打印预览"],ans:1,
   wrongs:["插入图片在\"插入\"菜单。", "", "导航窗格不能设置字体。", "导航窗格不能打印预览。"],
   explain:"「视图」→勾选「导航窗格」。左侧显示文档的大纲结构(标题1→标题2→标题3的层次树)。点击任何标题→文档自动跳转到对应位置。长文档(论文/报告)必备。"},
  {id:79,type:"Excel",q:"在Excel中，数据验证(数据有效性)可以用来做什么？",opts:["A. 限制单元格可输入的内容", "B. 检查公式错误", "C. 对比两个表格", "D. 加密工作表"],ans:0,
   wrongs:["", "检查公式错误用\"公式\"→\"错误检查\"。", "对比表格用\"并排查看\"或VLOOKUP。", "加密工作表用\"审阅\"→\"保护工作表\"。"],
   explain:"「数据」→「数据工具」→「数据验证」→可设置：①下拉列表(序列)②整数范围③日期范围④自定义公式验证。做表格模板、表单、日报表时必备。下拉列表是最常用的数据验证方式。"},
  {id:80,type:"PPT",q:"在PPT中，以下哪种方式不能插入视频？",opts:["A. 插入→视频→此设备", "B. 插入→视频→联机视频", "C. 直接拖拽视频文件到幻灯片", "D. 复制粘贴视频到幻灯片"],ans:3,
   wrongs:["插入→视频→此设备(或\"我的电脑上的视频\")，是可以的。", "插入→视频→联机视频(或\"来自网站的视频\")，粘贴YouTube等嵌入代码，是可以的。", "可以直接从文件夹拖拽视频文件到幻灯片上，是可以的。", ""],
   explain:"PPT不支持Ctrl+C/V粘贴视频文件！复制的是文件路径，不会嵌入视频。正确方式：插入→视频→此设备，或直接拖拽视频文件到幻灯片上。"},
  {id:81,type:"Word",q:"Word中，要保护文档不被随意编辑，可以设置什么？",opts:["A. 保存为PDF", "B. 限制编辑", "C. 加密码打开", "D. 以上都可以"],ans:3,
   wrongs:["PDF可以限制编辑但格式固定不好改。", "限制编辑是Word内置的保护功能。", "加密码打开可以防止未授权访问。", ""],
   explain:"「文件」→「信息」→「保护文档」→包括：①\"标记为最终状态\"(警告他人此为终稿)②\"用密码进行加密\"③\"限制编辑\"(限制格式修改或只允许批注)。三种方式可叠加使用。"},
  {id:82,type:"Excel",q:"Excel中，以下关于条件格式的说法正确的是？",opts:["A. 只能设置一种条件", "B. 可以按数据大小自动变色/加图标/加数据条", "C. 条件格式不能用于日期", "D. 设置了就不能删除"],ans:1,
   wrongs:["条件格式可以设置多条规则，每条规则有优先级。", "", "条件格式完全可用于日期列(如\"晚于今天\"标红)。", "规则可以删除——选中规则→删除规则。"],
   explain:"「开始」→「条件格式」→可设：①突出显示(大于/小于/重复值)②数据条(单元格内进度条)③色阶(红→绿渐变)④图标集(箭头/星/旗)。多条规则从上往下判断，靠上的先生效。"},
  {id:83,type:"PPT",q:"在PPT中，下面哪项可以在一页幻灯片中按顺序展示多个要点(每次点一下出一个)？",opts:["A. 切换", "B. 自定义动画→按序列逐个出现", "C. 母版", "D. 节"],ans:1,
   wrongs:["切换是幻灯片之间翻页的效果，不能控制单页内元素逐个出现。", "", "母版控制统一设计，不控制动画播放顺序。", "节用于幻灯片分组管理，不控制动画。"],
   explain:"选中每个要点 → 分别添加\"出现\"或\"淡入\"动画 → 触发方式选\"单击时\" → 在动画窗格中拖拽调整顺序。演讲时点一下出一个，控制节奏。"},
  {id:84,type:"Word",q:"在Word中，要插入一个不随文字移动的绝对位置的文本框，应该将文字环绕设为？",opts:["A. 嵌入型", "B. 四周型", "C. 浮于文字上方", "D. B或C都可以实现脱离文本流"],ans:3,
   wrongs:["嵌入型=图片像文字一样嵌在段落中，随文字上下移动。", "四周型可以脱离文本流并自由移动。", "浮于文字上方=图片盖在文字上面，也可以自由拖动。", ""],
   explain:"文字环绕类型中，\"嵌入型\"把图片当文字字符处理——随文本上下移动、不能自由拖动。\"四周型\"\"紧密型\"\"浮于文字上方\"\"衬于文字下方\"四种可以脱离文本流、自由拖动到任意位置。"},
  {id:85,type:"Excel",q:"Excel中，=CONCATENATE(A1,\"-\",B1) 的结果和以下哪个等价？",opts:["A. =A1-B1", "B. =A1&\"-\"&B1", "C. =A1+\"-\"+B1", "D. =JOIN(A1,B1)"],ans:1,
   wrongs:["减号-在Excel中是减法运算符。", "", "加号+是加法运算符不能拼接文本。", "Excel没有JOIN函数。JOIN是其他编程语言的函数，Excel类似的是TEXTJOIN。"],
   explain:"&和CONCATENATE效果相同——都是文本拼接。新Excel版本推荐用TEXTJOIN(分隔符, 忽略空值, 文本1, 文本2...)，支持指定分隔符。"},
  {id:86,type:"PPT",q:"在PPT中，以下关于超链接的说话，错误的是？",opts:["A. 可以链接到其他幻灯片", "B. 可以链接到网页", "C. 可以链接到电子邮件地址", "D. 超链接的文字不能更改颜色"],ans:3,
   wrongs:["超链接可以链接到文档中的其他幻灯片。", "可以链接到网页URL。", "可以链接到邮件地址(mailto:)。", ""],
   explain:"超链接文字颜色完全可以在母版或主题颜色中自定义。右键超链接→编辑超链接可改地址，右键→取消超链接可移除。左上角\"插入\"→\"链接\"→\"超链接\"或Ctrl+K。"},
  {id:87,type:"Word",q:"在Word中，要给跨页的表格每页都显示表头，应使用什么功能？",opts:["A. 手动每页复制", "B. 重复标题行", "C. 冻结窗格", "D. 页眉设置"],ans:1,
   wrongs:["手动复制太笨，且改表头之后其他页不会同步更新。", "", "\"冻结窗格\"是Excel的功能——让标题行在滚动时始终保持可见。", "页眉设置的是页面顶部的页眉区域，不是表格内部。"],
   explain:"选中表格的表头行(第一行或前几行)→右键→「表格属性」→「行」→勾选\"在各页顶端以标题行形式重复出现\"。或者：选中表头→「表格工具」→「布局」→「重复标题行」。自动在每页表格顶部显示表头。"},
  {id:88,type:"Excel",q:"Excel中，=INDEX(A1:C10, 2, 3) 返回什么？",opts:["A. A1:C10区域", "B. A1:C10中第2行第3列的值", "C. 错误值", "D. 第2行整行"],ans:1,
   wrongs:["INDEX不返回整个区域。", "", "如果引用的单元格不存在才会返回#REF!错误。", "INDEX返回的是一个值，不是整行。取整行用INDEX(A1:C10,2,0)。"],
   explain:"INDEX(区域, 行号, 列号) = 返回区域中指定位置的值。=INDEX(A1:C10,2,3)=C2单元格的值。常与MATCH搭配：=INDEX(区域, MATCH(查找值, 查找列, 0), 返回列号)，实现双向查找(比VLOOKUP更灵活)。"},
  {id:89,type:"PPT",q:"在PPT中，图片被压缩后无法恢复到原始质量。以下说法正确的是？",opts:["A. 压缩是可逆的", "B. 压缩不可逆，建议保留原图备份", "C. PPT没有压缩功能", "D. 只有插入时才能压缩"],ans:1,
   wrongs:["PPT图片压缩是破坏性的——丢弃原始像素数据来减小文件体积。", "", "PPT有图片压缩功能：「图片工具」→「压缩图片」。", "插入后的图片也可以随时压缩。"],
   explain:"图片压缩=减小PPT文件体积，但不可逆。建议：①压缩前另存一份未压缩的副本②仅在最终交付前执行压缩③选\"打印(220ppi)\"平衡质量和体积，\"电子邮件(96ppi)\"体积最小但模糊。"},
  {id:90,type:"Word",q:"在Word中，邮件合并功能的主要用途是？",opts:["A. 群发邮件", "B. 批量生成格式相同但数据不同的文档(如邀请函/工资条)", "C. 检查拼写", "D. 合并多个文档"],ans:1,
   wrongs:["邮件合并不是用来群发电子邮件的(虽然名字里有\"邮件\")。", "", "邮件合并跟拼写检查无关。", "邮件合并是生成多个文档，不是把多个文档合并成一个。"],
   explain:"邮件合并 = 模板文档 + 数据源 → 批量生成。经典场景：工资条(模板=工资条格式, 数据源=员工工资表)、邀请函(模板=统一正文, 数据源=受邀人名单)、证书(模板=证书格式, 数据源=学生成绩表)。操作题高频考点。"},
  {id:91,type:"Excel",q:"Excel中，以下哪个函数可以跳过隐藏行只对可见单元格求和？",opts:["A. SUM", "B. SUBTOTAL", "C. SUMIF", "D. COUNT"],ans:1,
   wrongs:["SUM不管隐藏不隐藏，全部加起来。", "", "SUMIF是条件求和，不能自动跳过隐藏行。", "AGGREGATE也能跳过隐藏行(但更复杂，考试一般不考)。"],
   explain:"SUBTOTAL(功能编号, 范围)。9=SUM(对可见单元格求和)。109=SUM(忽略手动隐藏行，但筛选隐藏的仍跳过)。常用编号：1=AVERAGE, 2=COUNT, 3=COUNTA, 4=MAX, 5=MIN, 9=SUM。"},
  {id:92,type:"PPT",q:"PPT中，对幻灯片进行排练计时后，计时结果会保存在哪里？",opts:["A. 备注里", "B. 切换设置中", "C. 每张幻灯片可以有不同的自动换片时间", "D. B和C"],ans:3,
   wrongs:["计时不保存在备注里。", "切换可以设置\"在此之后自动换片\"的时间但不一定经过排练。", "", ""],
   explain:"「幻灯片放映」→「排练计时」→从头开始排练→每换一张幻灯片系统记录该页展示时长→结束后保存计时→切换中可查看每页自动换片时间。可导出为视频时保留计时。"},
  {id:93,type:"Word",q:"在Word中，以下哪个功能可以实现长文档的多级编号(如1.1, 1.1.1)？",opts:["A. 手动输入", "B. 多级列表", "C. 项目符号", "D. 脚注"],ans:1,
   wrongs:["手动输入不能自动更新编号。", "", "项目符号是无序列表(圆点/方块)，不能实现1→1.1→1.1.1的层次编号。", "脚注是页面底部的注释。"],
   explain:"「开始」→「段落」→「多级列表」→选\"第1章 标题1\"格式→将标题1/标题2/标题3分别套用。新增章节自动编号为：第1章→1.1→1.1.1。关联到样式后更新目录时自动带编号。"},
  {id:94,type:"Excel",q:"在Excel中，以下关于图表的说法正确的是？",opts:["A. 图表与源数据无关", "B. 图表标题只能有一个", "C. 图表数据源改变后图表自动更新", "D. 不能更改图表类型"],ans:2,
   wrongs:["图表与数据源是动态链接的——源数据变了图表自动更新。", "图表可以添加主标题、副标题、横轴标题、纵轴标题等多个标题。", "", "图表类型可以随时更改：右键图表→\"更改图表类型\"。"],
   explain:"Excel图表的本质是数据源的\"可视化镜像\"。修改源数据→图表实时刷新。添加图表元素：点图表右上角\"+\"号→勾选\"图表标题\"\"数据标签\"\"图例\"等。"},
  {id:95,type:"PPT",q:"PPT中，\"演讲者备注\"在什么视图中可以看到但不能被观众看到？",opts:["A. 普通视图", "B. 幻灯片浏览", "C. 演示者视图", "D. 备注页"],ans:2,
   wrongs:["普通视图是日常编辑用的，观众能看到和编辑者一样的内容。", "幻灯片浏览是缩略图矩阵，观众看不到。", "", "备注页是自己看/打印用的，不是现场演示时用的。"],
   explain:"演示者视图：接投影仪或双屏时自动启用。自己屏幕显示：当前幻灯片+下一页预览+备注(提词)+计时器+笔/激光笔工具。观众屏幕：只显示当前幻灯片。是演讲者的\"秘密武器\"。"},
  {id:96,type:"Word",q:"Word中，以下关于分页符和分节符的说法，错误的是？",opts:["A. 分页符只是换页", "B. 分节符可以改变下一页的页面方向", "C. 分页符和分节符是同一个东西", "D. 分节符可以将文档拆分为不同的节"],ans:2,
   wrongs:["分页符只是强制换页，不能改变页面设置。", "分节符确实可以改变下一页的页面方向。", "", "分节符可以把文档分成多个节，每个节有独立的页面设置。"],
   explain:"分页符 ≠ 分节符。分页符只是\"这里强制换页\"——不改变页面格式。分节符可以在不同节之间设置：不同页边距、横向/纵向、不同页眉页脚、不同页面边框。论文排版中，封面(纵向)+正文(纵向)+附录表格(横向)通过分节符实现。"},
  {id:97,type:"Excel",q:"在Excel中，要保护工作表不被修改，正确做法是？",opts:["A. 另存为PDF", "B. 审阅→保护工作表→设置密码", "C. 隐藏行和列", "D. 删除不需要的数据"],ans:1,
   wrongs:["另存为PDF不能防止修改(PDF可以用编辑器修改)。", "", "隐藏行列只是看不见，取消隐藏就能看到并未加保护。", "删除数据不能防止别人更改剩余数据。"],
   explain:"「审阅」→「保护工作表」→输入密码→勾选允许用户做的操作(如\"选定锁定单元格\")。保护后：①锁定单元格不可编辑②可设定某些单元格允许编辑(先取消锁定再保护)③可隐藏公式不让别人看。保护工作簿则锁结构(不能增删改工作表名/顺序)。"},
  {id:98,type:"PPT",q:"PPT中，将演示文稿导出为视频(.mp4)，音频和计时会保留吗？",opts:["A. 会，保留旁白和排练计时", "B. 不会，视频无音频", "C. 只保留音频不保留动画", "D. 只保留第一页"],ans:0,
   wrongs:["", "导出的视频是无声的？不对——旁白是嵌入的所以会保留。", "动画也会保留在视频中。", "会保留所有幻灯片内容。"],
   explain:"「文件」→「导出」→「创建视频」→选择分辨率(1080p/720p)→选择\"使用录制的计时和旁白\"→创建视频。导出后所有切换/动画/旁白/激光笔轨迹/排练计时全部保留。适合做\"自动播放的视频演示\"。"},
  {id:99,type:"Word",q:"Word中，要统计某个词在文档中出现了几次，用什么功能？",opts:["A. 一个字一个字数", "B. 查找→在以下范围中查找→主文档", "C. 审阅→字数统计", "D. 导航窗格搜索"],ans:1,
   wrongs:["太慢且不准。", "", "审阅→字数统计只能统计总字数，不能统计某个词的出现次数。", "导航窗格只能搜到包含关键词的段落位置，不能统计出现次数。"],
   explain:"Ctrl+F→输入关键词→\"在以下范围中查找\"→\"主文档\"(或\"当前选择\")→Word会高亮所有匹配位置并在底部显示\"找到X个与此条件匹配的项\"。按Esc清除高亮。"},
  {id:100,type:"Excel",q:"Excel中，SUMIFS和SUMIF的区别是？",opts:["A. 没有区别", "B. SUMIF单条件求和，SUMIFS多条件求和", "C. SUMIFS只能用于文本", "D. SUMIF比SUMIFS快"],ans:1,
   wrongs:["两者参数个数和顺序都不同，有本质区别。", "", "SUMIFS也能用于数值条件。", "SUMIFS支持更多条件但函数本身不会更快(取决于数据量)。"],
   explain:"SUMIF(条件列, 条件, 求和列) = 单条件。SUMIFS(求和列, 条件列1, 条件1, 条件列2, 条件2...) = 多条件。关键区别：SUMIF求和列在第3个参数，SUMIFS求和列在第1个参数！参数顺序反了=0分。两个都支持>、<、>=、<=、=、<>等比较运算符。"},
  {id:101,type:"PPT",q:"在PPT中，\"组合\"和\"合并形状\"的关系是？",opts:["A. 完全一样", "B. 组合是整体移动，合并形状是创建新形状", "C. 合并形状就是组合", "D. 两者不能同时使用"],ans:1,
   wrongs:["功能完全不同。", "", "合并形状是布尔运算(联合/组合/拆分/相交/剪除)，不是简单群组。", "两者可以独立使用，不冲突。"],
   explain:"\"组合\"(Ctrl+G) = 群组在一起便于整体移动/缩放，每个组成部分仍然是独立对象。\"合并形状\" = 对两个或多个形状做布尔运算：联合(加在一起)、组合(重叠部分掏空)、拆分(切成碎片)、相交(只保留重叠部分)、剪除(用第一个减掉其他)。后者是创建复杂自定义形状的利器。"},
  {id:102,type:"Word",q:"Word中，要在一篇长文档中快速定位到第50页，最快的方法是？",opts:["A. 手动滚动", "B. Ctrl+G(定位)→输入页码→确定", "C. 缩小视图", "D. 用目录"],ans:1,
   wrongs:["手动滚动效率太低，长文档根本不行。", "", "缩小视图只能看到更多页的缩略图但不能直接定位到具体第几页。", "目录可以跳转到各章节标题，但不能直接跳到指定页码。"],
   explain:"Ctrl+G(或F5)→「定位」→选择定位目标(页/节/行/书签/批注/脚注等)→输入页码(如50)→「定位」。一步跳到第50页。可以定位到几乎所有能在Word中找到的目标。"},
  {id:103,type:"Excel",q:"在Excel中，=IFERROR(VLOOKUP(A1,B:C,2,0),\"未找到\") 中IFERROR的作用是？",opts:["A. 检查拼写", "B. 当VLOOKUP返回错误值时显示\"未找到\"", "C. 提高计算速度", "D. 标记公式为错误"],ans:1,
   wrongs:["IFERROR不会检查拼写(那是F7的功能)。", "", "IFERROR不能提高计算速度(相反会略微增加计算量)。", "IFERROR是处理错误的，不是标记错误的。"],
   explain:"IFERROR(公式, 出错时显示什么) = 错误捕获函数。VLOOKUP找不到值时返回#N/A→IFERROR把#N/A替换成\"未找到\"之类的友好提示。类似的还有IFNA(只捕获#N/A)、IFS(多条件判断)。"},
  {id:104,type:"PPT",q:"PPT中，以下哪个是正确的字体嵌入方式？",opts:["A. 直接复制粘贴", "B. 文件→选项→保存→将字体嵌入文件", "C. 截图保存文字", "D. 字体无法嵌入"],ans:1,
   wrongs:["无法通过复制粘贴嵌入字体。", "", "截图保存的是图片而非可编辑的文字。", "字体完全可以嵌入PPT中。"],
   explain:"「文件」→「选项」→「保存」→勾选\"将字体嵌入文件\"→选\"仅嵌入演示文稿中使用的字符\"(体积小/推荐)或\"嵌入所有字符\"(方便别人编辑)。嵌入后换到其他电脑也能正确显示字体。"},
  {id:105,type:"Excel",q:"Excel中，\"冻结窗格\"的作用是？",opts:["A. 保护工作表", "B. 滚动时保持某些行/列始终可见", "C. 锁定单元格", "D. 隐藏数据"],ans:1,
   wrongs:["保护工作表是限制编辑的，不是冻结窗口。", "", "锁定单元格是通过保护工作表实现的，不是冻结窗口。", "隐藏数据是隐藏行列，不是冻结窗口。"],
   explain:"「视图」→「冻结窗格」→三种模式：①冻结首行(顶部一直可见)②冻结首列(最左一直可见)③冻结拆分窗格(选中单元格上方和左侧全部冻结)。滚动时冻结区域始终不动——看大量数据必备。"},
  {id:201,type:"Word操作",q:"在Word中做邮件合并, 第一步应该做什么？",opts:["A. 插入合并域", "B. 选择收件人→使用现有列表", "C. 预览结果", "D. 完成并合并"],ans:1,
   wrongs:["插入合并域在前，收件人在后——顺序反了。没有数据源你往哪插域？", "", "预览是倒数第二步，前面还有选收件人和插入域。", "完成并合并是最后一步。"],
   explain:"邮件合并六步顺序：①选择文档类型(信函/邮件)→②选择收件人(Excel/Access)→③插入合并域→④预览→⑤完成并合并。顺序不能乱——先有数据源，才能插入合并域。"},
  {id:202,type:"Excel操作",q:"在Excel中做数据透视表, 以下哪步操作顺序正确？",opts:["A. 先排序再插入透视表", "B. 插入→数据透视表→拖拽字段到行列值区域", "C. 先筛选再插入透视表", "D. 先分类汇总再插入透视表"],ans:1,
   wrongs:["数据透视表不需要提前排序——它会自己整理。", "", "不需要提前筛选——透视表自带筛选功能(行/列/值/筛选区域)。", "不需要提前分类汇总——透视表自己就是更强的分类汇总。"],
   explain:"「插入」→「数据透视表」→确认数据区域→选\"新工作表\"→将字段拖入行/列/值/筛选区域。透视表会自动去重、排序、汇总，不需要任何预处理。"},
  {id:203,type:"Word操作",q:"长文档排版中, 要使正文各章节标题自动编号为'第1章''第2章', 应使用？",opts:["A. 手动输入", "B. 多级列表关联标题样式", "C. 项目符号", "D. 自动更正"],ans:1,
   wrongs:["手动输入不能自动更新(新增标题后编号不会自动续)。", "", "项目符号是无序的点/方块，不能生成\"第1章\"\"第2章\"这种有序编号。", "自动更正不能实现多级章节编号。"],
   explain:"多级列表关联标题样式 = Word最强自动编号功能。「开始」→「多级列表」→选\"第1章 标题1\"→将标题1/标题2分别套用到章/节标题上。新增章节→自动编号。好处：①自动连续②修改顺序后自动重排③目录自动抓取编号。"},
  {id:204,type:"Excel操作",q:"VLOOKUP函数中第4个参数写0(或FALSE)表示？",opts:["A. 模糊匹配", "B. 精确匹配", "C. 忽略大小写", "D. 反向查找"],ans:1,
   wrongs:["模糊匹配用1或TRUE。", "", "VLOOKUP不区分大小写(无论是0还是1都忽略大小写)。", "VLOOKUP只能从左往右查找，不能反向查找(反向用INDEX+MATCH)。"],
   explain:"VLOOKUP的第4参数：0(或FALSE)=精确匹配——找不到完全相同就返回#N/A。1(或TRUE)=模糊匹配——找最接近且不超过的值，要求查找列升序排列。考试中绝大多数情况用0(精确匹配)，只有涉及区间(如税率表)才用1。"},
  {id:205,type:"PPT操作",q:"要让多张PPT应用统一配色/字体/LOGO, 最高效的做法是？",opts:["A. 每页手动设置", "B. 格式刷逐个刷", "C. 在幻灯片母版中设置", "D. 复制粘贴"],ans:2,
   wrongs:["手动设置效率最低。", "格式刷只能刷有限个对象。", "", "复制粘贴不能保证位置和格式完全统一。"],
   explain:"幻灯片母版 = PPT的\"模板引擎\"。在母版中设置背景/字体/配色/LOGO→所有使用该版式的幻灯片自动同步→改母版一处=全PPT统一。"},
  {id:206,type:"Word操作",q:"生成自动目录前必须做什么？",opts:["A. 手动编号", "B. 将标题套用\"标题1\"\"标题2\"等样式", "C. 加粗所有标题", "D. 插入分页符"],ans:1,
   wrongs:["手动编号不能自动生成目录。", "", "加粗标题是一个格式，不能替代样式应用。", "插入分页符不能自动生成目录。"],
   explain:"目录三步曲：①给各标题套用\"标题1\"\"标题2\"\"标题3\"样式→②光标放在目录位置→「引用」→「目录」→选\"自动目录\"→③更新：右键目录→更新域→选\"只更新页码\"或\"更新整个目录\"。"},
  {id:207,type:"Excel操作",q:"SUMIF和SUMIFS的参数顺序有什么区别？",opts:["A. 没区别", "B. SUMIF(条件列,条件,求和列); SUMIFS(求和列,条件列1,条件1,...)", "C. SUMIFS求和列在最后", "D. 两者参数顺序完全一样"],ans:1,
   wrongs:["参数顺序不同：SUMIF求和列在第三个，SUMIFS的在第一个。", "", "SUMIFS求和列在第一个参数，不是在最后。", "两者参数数量和顺序完全不同。"],
   explain:"SUMIF(条件列, 条件, 求和列)。SUMIFS(求和列, 条件列1, 条件1, 条件列2, 条件2...)。注意SUMIFS的求和列在第一个参数！这是考试最喜欢扣你分的地方。"},
  {id:208,type:"Word操作",q:"在Word中将某一页改为横向, 其他页保持纵向, 正确操作是？",opts:["A. 页面设置→横向→应用于整篇文档", "B. 在该页前后各插入一个分节符→将该节的纸张方向改为横向", "C. 只能整篇统一", "D. 用文本框旋转"],ans:1,
   wrongs:["整篇全改成横向了不是只需要这一页横向。", "", "Word不支持一页横一页纵不支持？实际上是支持的——通过分节符。", "文本框旋转只能旋转文字/图片，不能改变整个页面的纸张方向。"],
   explain:"要在一篇纵向文档中插入一张横向表格页：①在横向页前插入分节符(下一页)→②在横向页后也插入分节符(下一页)→③横向页所在节设置纸张方向为\"横向\"。前后节保持纵向，中间节横向。"},
  {id:209,type:"PPT操作",q:"演示时按什么键可以快速跳转到第8张幻灯片？",opts:["A. F8", "B. Ctrl+8", "C. 直接按数字键8再按Enter", "D. Alt+8"],ans:2,
   wrongs:["F8没有跳转功能。", "Ctrl+8也没有。", "", "Alt+8也没有。"],
   explain:"放映时直接按键盘数字(8)然后Enter = 跳到第8张幻灯片。此外右键→\"查看所有幻灯片\"→点击目标页也可以。Ctrl+G在放映中没效果。"},
  {id:210,type:"Excel操作",q:"要对筛选后的数据进行求和, 且隐藏行不计入, 用哪个函数？",opts:["A. SUM", "B. SUBTOTAL", "C. SUMIF", "D. AGGREGATE"],ans:1,
   wrongs:["SUM不管你是否筛选——所有数据全加起来。", "", "SUMIF是条件求和，筛选取消后可能会把隐藏的也算进去。", "AGGREGATE也能跳过隐藏行但用SUBTOTAL更常见且考试更常考。"],
   explain:"SUBTOTAL(功能编号, 范围) 自动跳过筛选隐藏的行。SUBTOTAL(9, B2:B100) = 对B列筛选后可见的单元格求和。109系列编号还会额外跳过手动隐藏的行。"},
  {id:211,type:"Word操作",q:"跨页表格每页自动显示表头, 正确操作是？",opts:["A. 手动在每页第一行复制表头", "B. 选中表头→表格工具→布局→重复标题行", "C. 冻结窗格", "D. 页眉中插入表头"],ans:1,
   wrongs:["手动复制效率低且一旦修改表头其他页不会自动同步。", "", "\"冻结窗格\"是Excel的功能——让标题行在滚动时保持可见，不是Word表格功能。", "页眉区域是文档的页眉而不是表格内部的标题行。"],
   explain:"选中表格表头行→「表格工具」→「布局」→「重复标题行」。每页顶部自动出现表头。注意：\"冻结窗格\"是Excel功能(视图→冻结窗格)，Word表格的类似功能叫\"重复标题行\"——两个名字别弄混。"},
  {id:212,type:"Excel操作",q:"当公式向下填充时, 要让D2始终引用B1这个单元格, 应该写成？",opts:["A. B1", "B. $B$1", "C. B$1", "D. $B1"],ans:2,
   wrongs:["B1=行列都相对，向下填充变成B2。", "$B$1=行列都绝对，向下填充永远是B1。效果也是对的，但本题问的是\"向下填充\"场景，B$1就够了。", "", "$B1=列绝对行相对，向下填充行标1会变成2/3/4...。"],
   explain:"B$1 = 列B相对(可左右变)，行1绝对(向下填充永远第1行)。$B$1也可以但更\"紧\"(左右拖动也不变)。考试常考：给一个公式向下填充，问某个单元格的公式变成什么样？牢记$锁住谁谁不变。"},
  {id:213,type:"PPT操作",q:"想把一个大段文字分成两列排版, 正确做法是？",opts:["A. 插入两个文本框", "B. 选中文本框→开始→分栏→两列", "C. 用表格分开", "D. 按回车换行"],ans:1,
   wrongs:["插入两个文本框也可以但不如分栏方便——分栏是自动平衡左右列高度。", "", "用表格做两列排版也可以但不优雅。", "按回车纯粹是手动换行。"],
   explain:"选中文本框→「开始」→「段落」→「分栏」→选两列或更多列。PPT的分栏在\"开始\"菜单下(跟Word不同——Word的\"分栏\"在\"布局\"菜单下)。列间距和分隔线可以自定义。"},
  {id:214,type:"Excel操作",q:"做分类汇总前, 必须对什么字段先排序？",opts:["A. 汇总的值字段", "B. 分类字段", "C. 日期字段", "D. 不需要排序"],ans:1,
   wrongs:["汇总值字段不需要排序。", "", "日期字段不是必须排序的(除非按日期分类)。", "必须排序！否则同一类别会分成多组。"],
   explain:"分类汇总前必须按分类字段排序！原因：分类汇总按\"分类字段\"的值分组→要求同类项相邻。如果不排序：\"苹果\"\"香蕉\"\"苹果\"会被分成三组\"苹果\"\"香蕉\"\"苹果\"——每组\"苹果\"的汇总值是分开的，结果重复且错误。"},
  {id:215,type:"Word操作",q:"如何只删除文档中所有的空行？",opts:["A. 一个一个删", "B. 查找替换:查找^p^p替换为^p, 多次执行", "C. 删除分页符", "D. 删除分节符"],ans:1,
   wrongs:["逐个删太慢。", "", "分页符是强制换页的标记(^m)，不是空行(^p^p)。", "分节符是页面版式分隔标记(^b)，也不是空行。"],
   explain:"通配符替换：^p=段落标记(回车符)。两个连续^p^p=一个空行。把它替换成一个^p=删掉一个空行。反复执行直到0个。也可以在\"查找内容\"里写^13^13(Unicode段落标记)替换为^13。"},
  {id:216,type:"PPT操作",q:"放映时想看到下一页预览和备注, 观众只看到当前页, 需要什么？",opts:["A. 阅读视图", "B. 演示者视图", "C. 普通视图", "D. 大纲视图"],ans:1,
   wrongs:["阅读视图是简化版播放模式，不显示备注和下一页预览。", "", "普通视图是日常编辑用的。", "大纲视图只显示文字提纲。"],
   explain:"演示者视图 = 接投影/双屏时自动启用。演讲者屏幕：当前幻灯片+下一页预览+备注(提词)+计时器+笔/激光笔工具。观众屏幕：只显示当前幻灯片。"},
  {id:217,type:"Excel操作",q:"Excel中, =MID(B2,3,2)表示从B2单元格的第几个字符开始取几位？",opts:["A. 第2位取3位", "B. 第3位取2位", "C. 第3列第2行", "D. 从第2位开始"],ans:1,
   wrongs:["如果从第2位取3位参数应该是MID(B2,2,3)。", "", "MID跟列/行无关，那是INDEX的语法。", "从第2位开始但到底取几位MID需要三个参数。"],
   explain:"MID(文本, 开始位置, 字符数)。=MID(B2,3,2) = 从B2的第3个字符开始取2个字符。如B2=\"20240915\"→MID(B2,3,2)=\"24\"。常用来提取身份证号中的出生年份(从第7位取4位)。"},
  {id:218,type:"Word操作",q:"要把图片设置为文字紧密围绕图片轮廓排列, 选什么？",opts:["A. 嵌入型", "B. 四周型", "C. 紧密型", "D. 上下型"],ans:2,
   wrongs:["嵌入型=图片当文字对待，不能自由拖动。", "四周型=文字沿图片的矩形边界排列。", "", "上下型=文字只在图片上方和下方，左右不排文字。"],
   explain:"右键图片→「文字环绕」→\"紧密型\"=文字紧贴图片的实际轮廓排列。\"四周型\"=沿矩形边框。\"嵌入型\"=图片插入在段落中像文字一样。\"浮于文字上方\"=图片盖在文字上面。\"衬于文字下方\"=图片在文字底下做背景。"},
  {id:219,type:"Excel操作",q:"保护工作表时可以设置什么？",opts:["A. 只能完全锁定", "B. 可设置密码+允许用户做特定操作(如仅选单元格)", "C. 只能保护公式", "D. 不能取消保烦"],ans:1,
   wrongs:["只能完全锁定是错的——可以精确设置允许哪些操作。", "", "用\"审阅\"→\"允许用户编辑区域\"可以只保护特定区域(如公式)，但不是只能保护公式。", "保护工作表当然可以取消——\"审阅\"→\"撤销工作表保护\"(输入密码)。"],
   explain:"「审阅」→「保护工作表」→输入密码→在\"允许此工作表的所有用户进行\"列表中勾选允许的操作(如\"选定锁定单元格\"\"选定未锁定单元格\"\"插入行\"等)。灵活控制不同用户对该工作表的操作权限。"},
  {id:220,type:"PPT操作",q:"想要每张幻灯片自动在右下角显示幻灯片编号, 应：",opts:["A. 手动输入", "B. 插入→页眉和页脚→勾选\"幻灯片编号\"→全部应用", "C. 幻灯片母版中加文本框", "D. 用页脚占位符"],ans:1,
   wrongs:["手动输入不能自动更新。", "", "母版中有页脚占位符可以显示编号——但前提是插入页眉页脚勾选了编号。", "页脚占位符是母版中控制页脚位置的框，但编号本身需要在母版中插入。"],
   explain:"「插入」→「页眉和页脚」→勾选\"幻灯片编号\"→\"全部应用\"。首页不显示编号的话勾选\"标题幻灯片中不显示\"。想让编号格式统一→在幻灯片母版的编号占位符中设置字体/大小/颜色。"},
  {id:221,type:"Word操作",q:"文档部分内容需要分两栏排版, 其他部分保持一栏, 关键操作是？",opts:["A. 直接选分栏", "B. 在分栏内容前后插入分节符→对该节单独设置分栏", "C. 用文本框", "D. 用表格"],ans:1,
   wrongs:["直接选分栏会把整篇文档都变成两栏。", "", "文本框可以局部放文字但不如分节符优雅。", "表格可以实现局部两栏但结构笨重。"],
   explain:"Word的\"分栏\"默认作用于整个文档/当前节。如果只想部分内容分栏：①在分栏内容前后各插入一个\"连续\"分节符→②光标放在该节内→③设置分栏为两栏。前后节(没分栏的)不受影响。"},
  {id:222,type:"Excel操作",q:"以下哪个是正确的嵌套IF公式？",opts:["A. =IF(A1>90,IF(A1>60,\"B\",\"C\"),\"A\")", "B. =IF(A1>=90,\"A\",IF(A1>=60,\"B\",\"C\"))", "C. =IF(IF(A1>90,\"A\",\"B\"),\"C\")", "D. =IF(A1,90,60)会出错"],ans:1,
   wrongs:["A选项的判断顺序是错误的：如果A1>90不会返回正确结果(因会被第二个IF覆盖)。", "", "C和D都包含语法错误——B是唯一逻辑正确的嵌套IF。", ""],
   explain:"嵌套IF正确的判断顺序：从最高分档往低分档写。=IF(A1>=90,\"A\",IF(A1>=60,\"B\",\"C\"))。如果反过来(先判断>=60再判断>=90)——因为所有>=90的都已满足>=60，永远不会进入第二个IF，所有>=60的都返回\"B\"。顺序决定结果。"},
  {id:223,type:"PPT操作",q:"给一组对象统一做动画效果(如同时飞入), 最便捷的方式是？",opts:["A. 逐个设置动画", "B. 选中所有对象→Ctrl+G组合→给组合加动画", "C. 用格式刷", "D. 复制粘贴"],ans:1,
   wrongs:["逐个设置动画太慢且不够统一。", "", "格式刷不能复制动画设置。", "复制粘贴会复制整个对象+内容，不是复制动画效果。"],
   explain:"Ctrl+G组合 = 将多个对象合并为一个群组。给群组加动画→群组内所有对象同时执行该动画。如果想每个对象分别动→不要组合，分别设置动画后在动画窗格中排序。"},
  {id:224,type:"Word操作",q:"要对长文档中所有\"计算机\"三个字设置为红色加粗, 最快方式是？",opts:["A. 逐个手动改", "B. 查找\"计算机\"→替换→格式→字体→红色加粗→全部替换", "C. 用格式刷", "D. 用样式"],ans:1,
   wrongs:["逐个改太慢，长文档根本不可能。", "", "格式刷只能刷一个位置的格式，不能一次性刷全文档的所有\"计算机\"。", "样式是统一设置标题/正文格式的，不能快速修改文档中某个特定词汇的格式。"],
   explain:"「开始」→「编辑」→「替换」(Ctrl+H)→在\"查找内容\"输入\"计算机\"→光标放在\"替换为\"框(不输入任何文字)→点\"更多\"→「格式」→「字体」→设置红色+加粗→「全部替换」。替换内容留空但指定了格式=只改格式不改文字。"},
  {id:225,type:"Excel操作",q:"想要用数据验证做一个下拉菜单(选项列表), 操作路径是？",opts:["A. 数据→数据验证→允许→序列→来源输入选项逗号分隔", "B. 插入→下拉列表", "C. 审阅→数据验证", "D. 开始→条件格式"],ans:0,
   wrongs:["", "插入菜单中没有\"下拉列表\"按钮——正确入口是\"数据\"→\"数据验证\"。", "审阅菜单中没有数据验证。数据验证在\"数据\"菜单下。", "条件格式是设置单元格颜色/图标等视觉样式的，不能做下拉菜单。"],
   explain:"做下拉菜单三步：①选中单元格→「数据」→「数据工具」→「数据验证」→②「允许」→选\"序列\"→③「来源」→输入\"选项A,选项B,选项C\"(英文逗号分隔)→确定。点击单元格→右侧出现下拉箭头→只能从预设选项中选。"},
  {id:226,type:"Word操作",q:"审阅→\"修订\"模式下, 对文档的修改会怎样显示？",opts:["A. 直接覆盖原文", "B. 以标记方式显示修改痕迹(红色/删除线/批注)", "C. 不保存修改", "D. 只显示不改动"],ans:1,
   wrongs:["直接覆盖原文是关闭修订模式后的效果。", "", "修订模式下修改仍然会被Ctrl+Z撤销或Ctrl+S保存——只是以标记的方式展示出来。", "修订确实也显示，但不只是显示——文档内容确实也改了，只是以标记的方式区分\"原来的\"和\"改后的\"。"],
   explain:"「审阅」→「修订」→开关打开后：①删除的文字→红色+删除线②新增文字→红色+下划线③格式变更→红色气泡框标注④每行左侧有红色竖线标记。审阅者可以逐条点击「接受」或「拒绝」→最终确认版本。"},
  {id:227,type:"PPT操作",q:"要从一大堆图片中快速选出合适的图片做PPT, 哪个功能可以预览和插入？",opts:["A. 插入→图片→此设备", "B. 插入→相册", "C. 插入→联机图片", "D. 以上都可以"],ans:1,
   wrongs:["插入→图片→此设备可以浏览文件插入单张图，但不能批量快速制作相册。", "", "联机图片是搜索网络图片的，不是浏览本地图片文件夹。", "三者都能插入图片，但批量制作幻灯片相册只能用\"相册\"功能。"],
   explain:"「插入」→「图像」→「相册」→「新建相册」→「文件/磁盘」→选中多张图片→调整顺序→「创建」。每张图自动放一张幻灯片/或多张图放一页。适合快速制作产品/活动/旅游照片PPT。"},
  {id:228,type:"Excel操作",q:"工作表中公式显示为=SUM(A1:A10)而不是计算结果, 原因可能是？",opts:["A. 公式写错了", "B. 单元格格式是文本, 或按了Ctrl+`切换到了显示公式模式", "C. 数据不对", "D. 需要按F9"],ans:1,
   wrongs:["公式写错会显示#VALUE! / #REF! / #NAME?等错误值，不是显示公式本身。", "", "如果数据不对(比如引用了空单元格)，SUM仍会计算但结果跟预期不同——但不会显示公式本身。", "F9是手动重新计算整个工作簿，不是切换显示公式模式。"],
   explain:"两个可能原因：①单元格格式是\"文本\"——右击→「设置单元格格式」→改为\"常规\"→双击单元格回车重新输入。②按了Ctrl+`(反引号，在ESC下面，~同一个键)——切换显示公式/显示结果模式，再按一次切回来。"},
  {id:229,type:"Word操作",q:"在论文排版中, 如何让奇偶页有不同的页眉？",opts:["A. 不能设置不同", "B. 页眉页脚工具→勾选\"奇偶页不同\"→分别设置", "C. 手动每页改", "D. 用分节符"],ans:1,
   wrongs:["Word完全可以设置奇偶页不同页眉。", "", "手动逐页改效率太低且不准确。", "分节符可以让不同节有不同的页眉(如第1章和第2章页眉不同)，但奇偶页不同不需要分节——在同一节内即可设置。"],
   explain:"双击页眉→「页眉和页脚工具」→勾选\"奇偶页不同\"。奇数页页眉=论文题目/书名。偶数页页眉=当前章节标题。如果想首页(封面)也单独设置→同时勾选\"首页不同\"。"},
  {id:230,type:"Excel操作",q:"=COUNTIFS(A1:A100,\">=60\",B1:B100,\"男\") 功能是？",opts:["A. 对A列求和", "B. 统计A列≥60且B列为\"男\"的行数", "C. 筛选数据", "D. 统计B列男性个数"],ans:1,
   wrongs:["对A列求和用SUM(A1:A100)，不是COUNTIFS。", "", "筛选数据用\"数据\"→\"筛选\"，不是函数。", "B列为\"男\"只是第二个条件，还需要A列≥60的条件。"],
   explain:"COUNTIFS(条件范围1, 条件1, 条件范围2, 条件2) = 多条件计数。=COUNTIFS(A1:A100,\">=60\",B1:B100,\"男\")统计同时满足两个条件的行数。最多支持127个条件对。"},
  {id:231,type:"PPT操作",q:"想要录制旁白解说并保存到PPT, 操作路径是？",opts:["A. 插入→音频→录制音频", "B. 幻灯片放映→录制幻灯片演示→从头开始录制", "C. 切换→声音", "D. 插入→视频"],ans:1,
   wrongs:["插入→音频→录制音频只能录制短片段，不适合录制整场讲解。", "", "切换→声音是给切换效果添加音效(如\"风铃\"声)，不是录制旁白。", "插入视频跟录制旁白无关。"],
   explain:"「幻灯片放映」→「录制幻灯片演示」→勾选\"旁白和激光笔\"+\"幻灯片和动画计时\"→「开始录制」。录制中正常演讲、画激光笔标记→每页的展示时长也会被记录→自动应用到切换计时。"},
  {id:232,type:"Word操作",q:"在一篇文档中, 第1页不显示页码, 第2页从1开始编号, 关键操作是？",opts:["A. 手动输入", "B. 首页不显示页码+第2页所在节起始页码设为1", "C. 删除第1页", "D. 用两篇文档"],ans:1,
   wrongs:["手动输入页码不能自动更新。", "", "删除第1页会丢失整个封面内容。", "用两篇文档合并是可以的但很笨重。"],
   explain:"第1页(封面)不显示页码，正文从1开始编号：①封面和正文之间插入分节符→②双击正文第1页的页脚→取消\"链接到前一节\"→③设置页码→④「设置页码格式」→\"起始页码\"=1。⑤回到封面页的页脚→删除页码(或勾选\"首页不同\")。"},
  {id:233,type:"Excel操作",q:"以下哪个函数可以把\"2024年9月15日\"这个文本转为Excel可识别的日期？",opts:["A. TEXT", "B. DATEVALUE", "C. DATE", "D. CONVERT"],ans:1,
   wrongs:["TEXT是将数字/日期转为指定格式的文本，可以反向格式化但不能把文本转为日期值。", "", "DATE(2024,9,15)=日期值2024/9/15。但DATE的参数是三个独立的数字，不能直接转换文本字符串\"2024年9月15日\"。", "CONVERT是单位转换函数(如英寸→厘米)，不能转换日期。"],
   explain:"DATEVALUE(\"2024-9-15\")将文本格式的日期转为Excel的日期序列号→设置单元格格式为\"日期\"即可正常显示。还可以用\"分列\"功能(数据→分列→下一步→下一步→日期)批量转换文本日期。"},
  {id:234,type:"PPT操作",q:"PPT中想要几张图快速统一大小并排列整齐, 最快的方法是？",opts:["A. 手动逐个调整", "B. 选中多张图→图片工具→对齐→统一宽高+分布排列", "C. 用SmartArt", "D. 用表格定位"],ans:1,
   wrongs:["逐个调整太慢速度。", "", "SmartArt也可用来统一布局但用于排版不同图片不如\"对齐\"功能灵活。", "表格也可以做规整排列但不如\"图片工具\"→\"对齐\"方便。"],
   explain:"选中多张图→「图片工具」→「格式」→统一高度/宽度(在大小框中输入)→「对齐」→\"左对齐\"+\"纵向分布\"(垂直间距相等)或\"顶端对齐\"+\"横向分布\"(水平间距相等)。数秒排整齐。"},
  {id:235,type:"Excel操作",q:"以下关于条件格式的说法, 哪个是对的？",opts:["A. 一个单元格只能设一条规则", "B. 可设多条规则且可调优先级", "C. 条件格式只能用于数字", "D. 规则不能删除"],ans:1,
   wrongs:["一个单元格可以设多条条件格式规则——每条规则有优先级。", "", "条件格式完全可用于文本(如\"等于\"\"包含\"\"重复值\")、数值、日期。", "规则当然可以删除——选中规则→\"删除规则\"。"],
   explain:"「条件格式」→「管理规则」→可设多条规则。规则从上往下判断→靠上的先生效→勾选\"如果为真则停止\"可截断后续规则。可以复制条件格式到其他区域(用格式刷或粘贴→\"条件格式\")。"},
  {id:236,type:"Word操作",q:"要对两个版本文档做对比, 看有哪些修改, 应使用？",opts:["A. 手动比对", "B. 审阅→比较→比较文档的两个版本", "C. 并排查看", "D. 修订"],ans:1,
   wrongs:["手动比对太容易漏且效率低。", "", "并排查看只是同时显示两个窗口，不能自动标出差异。", "修订需要提前开启，如果两份独立文档各自编辑了，修订也显示不了差异。"],
   explain:"「审阅」→「比较」→「比较」→选原文档和修订文档→Word生成一份新文档，其中用修订标记的方式显示两份文档之间的所有差异——新增/删除/格式变更一目了然。"},
  {id:237,type:"Excel操作",q:"想根据A列的学生成绩, 自动给前3名标记为'金''银''铜', 最佳方式是？",opts:["A. 手动筛选", "B. 用RANK+IF嵌套, 或者条件格式→图标集", "C. 排序", "D. 数据验证"],ans:1,
   wrongs:["手动筛选不能自动标记前3名。", "", "排序只能重新排列数据，不能自动打标签。", "数据验证是限制输入的，不能根据数值自动标记。"],
   explain:"①条件格式方法：选中成绩列→「条件格式」→「项目选取规则」→\"前10项\"改为3→设置格式。②RANK+IF方法：=IF(RANK(A1,$A$1:$A$100)<=3,\"奖\",\"\")。双击填充柄复制到所有行。"},
  {id:238,type:"Word操作",q:"如何在Word中插入一个不随文字移动的Logo(放右上角固定位置)？",opts:["A. 直接粘贴", "B. 把图片放在页眉中→调整位置", "C. 文本框", "D. 只放在第一页"],ans:1,
   wrongs:["直接粘贴在正文区会随文字上下移动。", "", "文本框需要手动拖到每一页而且不能自动适应不同页面。", "只放第一页的话，其他页还是没有LOGO。"],
   explain:"将LOGO放在页眉中=所有页自动显示LOGO且位置一致。双击页眉→插入LOGO图片→拖到右上角→关闭页眉。如果只有某些页需要，配合分节符+取消\"链接到前一节\"。"},
  {id:239,type:"PPT操作",q:"想要对象逐个出现且上一个自动消失, 动画应设置为？",opts:["A. 都设\"单击时\"", "B. 第一个\"出现\",第二个开始设\"出现\"+\"消失\"动画", "C. 只用一个动画", "D. 用切换效果"],ans:1,
   wrongs:["都设\"单击时\"能达到逐个出现的效果但上一个不会自动消失——你需要手动加消失动画。", "", "一个动画当然不够——需要多个对象依次出现,每个有自己独立的动画。", "切换是幻灯片之间的翻页效果，不能控制幻灯片内元素逐个出现。"],

let state = {
  idx:0, correct:0, wrong:0,
  streak:0, maxStreak:0, points:0,
  answered:false, dailyDone:false,
  xp:0, level:1
};

const DAILY_LIMIT = 30;
const shuffled = [...QUESTIONS].sort(()=>Math.random()-.5).slice(0, DAILY_LIMIT);

// ── 渲染 ──────────────────────────────
function renderQuestion(){
  if(state.idx >= shuffled.length){ showComplete(); return; }
  const q = shuffled[state.idx];
  state.answered = false;
  document.getElementById('qCard').className = 'q-card';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btnNext').className = 'btn btn-next';
  document.getElementById('qNum').textContent = `第 ${state.idx+1} 题 · ${q.type}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progLabel').textContent = `📋 今日挑战 ${state.idx+1}/${DAILY_LIMIT}`;
  document.getElementById('progFill').style.width = ((state.idx)/DAILY_LIMIT*100)+'%';

  const optsEl = document.getElementById('options');
  optsEl.innerHTML = q.opts.map((o,i)=>`
    <div class="opt" onclick="selectAnswer(${i})" data-idx="${i}">
      <span class="letter">${'ABCD'[i]}</span>${o.substring(2).trim()}
    </div>
  `).join('');

  updateScoreBar();
}

function selectAnswer(idx){
  if(state.answered) return;
  state.answered = true;
  const q = shuffled[state.idx];
  const correct = q.ans;
  const opts = document.querySelectorAll('.opt');

  opts.forEach(o=>{ o.style.pointerEvents='none' });
  opts[correct].classList.add('correct-opt');

  const fb = document.getElementById('feedback');
  const card = document.getElementById('qCard');
  const corText = q.opts[correct].substring(2).trim();

  if(idx === correct){
    state.correct++; state.streak++; state.points += 10 + state.streak*2;
    if(state.streak > state.maxStreak) state.maxStreak = state.streak;
    card.classList.add('correct');
    fb.className = 'feedback correct show';
    fb.innerHTML = `<div class="fb-icon">✅</div><div class="fb-title">正确！+${10+state.streak*2}分 · ${'ABCD'[correct]}: ${corText}</div><div class="fb-explanation">${q.explain}</div>`;
    showCombo(state.streak);
    gainXP(5 + state.streak);
  } else {
    const badText = q.opts[idx].substring(2).trim();
    opts[idx].classList.add('wrong-opt');
    state.wrong++; state.streak = 0;
    card.classList.add('wrong');
    fb.className = 'feedback wrong show';
    const wrongWhy = q.wrongs ? q.wrongs[idx] : '';
    fb.innerHTML = `<div class="fb-icon">❌</div><div class="fb-title">你选了 ${'ABCD'[idx]}：${badText}</div>
      ${wrongWhy?`<div class="fb-wrong-hint">⚠ ${wrongWhy}</div>`:''}
      <div style="margin-top:12px;padding:12px;background:rgba(52,211,153,.08);border-radius:10px;border-left:3px solid #34d399">
        <div style="font-weight:700;color:#34d399;margin-bottom:6px">✅ ${'ABCD'[correct]}: ${corText}</div>
        <div class="fb-explanation" style="color:#bbb">${q.explain}</div>
      </div>`;
    gainXP(1);
  }

  document.getElementById('btnNext').classList.add('show');
  updateScoreBar();
}

function showCombo(s){
  if(s<3) return;
  const p = document.getElementById('comboPopup');
  const emojis = {3:'🔥 三连击',5:'⚡ 五连击',8:'💥 八连击',10:'👑 完美十连',15:'🌟 神级连击'};
  let text = '';
  for(let [k,v] of Object.entries(emojis)){ if(s>=parseInt(k)) text=v; }
  p.textContent = text;
  p.className = `combo-popup ${s>=10?'perfect':'fire'}`;
  p.style.animation = 'none';
  void p.offsetWidth;
  p.style.animation = 'comboIn .8s ease-out forwards';
}

function gainXP(amt){
  state.xp+=amt;
  const lvl = Math.floor(state.xp/50)+1;
  if(lvl>state.level){ state.level=lvl; }
  document.getElementById('xpLabel').textContent = `⚡ Lv.${state.level}`;
}

function nextQuestion(){
  state.idx++;
  if(state.idx>=shuffled.length){ showComplete(); return; }
  renderQuestion();
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btnNext').className = 'btn btn-next';
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateScoreBar(){
  document.getElementById('points').textContent = state.points;
  document.getElementById('streak').textContent = state.streak;
  const total = state.correct+state.wrong;
  document.getElementById('accuracy').textContent = total ? Math.round(state.correct/total*100)+'%' : '—';
}

function showComplete(){
  document.getElementById('quizArea').style.display = 'none';
  const comp = document.getElementById('complete');
  comp.classList.add('show');
  const acc = state.correct+state.wrong > 0 ? Math.round(state.correct/(state.correct+state.wrong)*100) : 0;
  document.getElementById('completeEmoji').textContent = acc>=90?'🏆':acc>=70?'🎉':acc>=50?'💪':'📚';
  document.getElementById('completeScore').textContent = state.points+' 分';
  document.getElementById('statCorrect').textContent = state.correct;
  document.getElementById('statWrong').textContent = state.wrong;
  document.getElementById('statMaxStreak').textContent = state.maxStreak;
  document.getElementById('statTotal').textContent = state.points;
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('progLabel').textContent = '📋 今日挑战完成！';
}

function resetDaily(){
  state = {idx:0,correct:0,wrong:0,streak:0,maxStreak:0,points:0,answered:false,dailyDone:false,xp:0,level:1};
  document.getElementById('quizArea').style.display = 'block';
  document.getElementById('complete').className = 'complete';
  document.getElementById('btnNext').className = 'btn btn-next';
  updateScoreBar();
  document.getElementById('xpLabel').textContent = '⚡ Lv.1';
  renderQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}

function initSimulators(){
  const sel = document.getElementById('simSelector');
  sel.innerHTML = SIMULATORS.map((s,i)=>`<button class="tab-btn ${i===0?'active':'inactive'}" style="font-size:13px" onclick="loadSimulator(${i})">${s.icon} ${s.title}</button>`).join('');
  loadSimulator(0);
}

function loadSimulator(idx){
  currentSim = idx;
  simStep = 0;
  // Update selector buttons
  document.querySelectorAll('#simSelector .tab-btn').forEach((b,i)=>{b.className=`tab-btn ${i===idx?'active':'inactive'}`;});
  renderSimulator();
}

function renderSimulator(){
  const sim = SIMULATORS[currentSim];
  const allDone = simStep >= sim.steps;

  let stepsHtml = sim.stepsLabels.map((l,i)=>{
    let cls = i < simStep ? 'done' : i === simStep && !allDone ? 'current' : '';
    return `<div class="sim-step-dot ${cls}">${i+1}</div>`;
  }).join('');

  let ribbonHtml = buildSimRibbon(sim);
  let instText = allDone ? '🎉 <b>全部完成！</b>你已掌握了「'+sim.title.replace(/[^一-龥]/g,'')+'」的完整操作流程。在真实Office中按这个顺序操作即可。' : sim.instructions[simStep];

  let fbHtml = '';
  if(simState.feedback){
    fbHtml = `<div class="sim-feedback-msg show ${simState.feedbackType}">${simState.feedback}</div>`;
    // Auto-clear feedback after 2.5s unless it's the completion message
    if(!simState.feedback.includes('全部完成')){
      setTimeout(()=>{simState.feedback='';renderSimulator();},2500);
    }
  }

  document.getElementById('simContent').innerHTML = `
    <div class="sim-instruction"><span class="step-badge">步骤 ${allDone?sim.steps:simStep+1}/${sim.steps}</span>${instText}</div>
    <div class="sim-progress-steps">${stepsHtml}</div>
    ${fbHtml}
    <div class="sim-wrap">
      <div class="sim-top"><span class="dot" style="background:#f87171"></span><span class="dot" style="background:#fbbf24"></span><span class="dot" style="background:#34d399"></span>Microsoft ${sim.id==='master'?'PowerPoint':'Word/Excel'} 2016 — 操作模拟</div>
      <div class="sim-win">${ribbonHtml}</div>
    </div>
    ${allDone?`<button class="btn btn-next show" style="margin-top:10px" onclick="simStep=0;simState={};loadSimulator(currentSim)">🔄 重新练习</button>`:''}
  `;

  // Bind click handlers for hotzones
  setTimeout(()=>{
    document.querySelectorAll('.sim-hotzone').forEach(el=>{
      el.onclick = function(){
        const target = this.dataset.target;
        handleSimClick(target);
      };
    });
  },50);
}

function handleSimClick(target){
  const sim = SIMULATORS[currentSim];
  const expected = sim.stepsTargets[simStep];

  if(target === expected){
    // Correct click!
    simState.feedback = sim.hints.correct[simStep];
    simState.feedbackType = 'ok';
    simStep++;
    // Check if all done
    if(simStep >= sim.steps){
      simState.feedback = '🎉 <b>全部完成！</b>你已完全掌握了「'+sim.title.replace(/[^一-龥]/g,'')+'」的操作流程。在真实Office中照这个顺序点即可。';
    }
  } else {
    // Wrong click
    simState.feedback = sim.hints.wrong[simStep];
    simState.feedbackType = 'err';
  }
  renderSimulator();
}
